<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>48 音标速查表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;
  --card:#fff;
  --text:#1a1a1a;
  --text2:#666;
  --text3:#999;
  --border:#e5e5e5;
  --hover:#f5f5f5;
  
  /* 分类颜色 - 简洁纯色 */
  --vowel:#dc2626;
  --vowel-bg:#fef2f2;
  --consonant:#2563eb;
  --consonant-bg:#eff6ff;
  --diphthong:#059669;
  --diphthong-bg:#f0fdf4;
  
  --accent:#111;
}
html,body{
  min-height:100%;
  font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* 顶部标题区 - 极简风格 */
.header{
  padding:48px 40px 32px;
  max-width:1400px;
  margin:0 auto;
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:42px;
  font-weight:700;
  letter-spacing:-0.5px;
  margin-bottom:8px;
}
.header .sub{
  font-size:15px;
  color:var(--text2);
  font-weight:400;
}

/* 网格 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  padding:0 40px 60px;
  max-width:1400px;
  margin:0 auto;
}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.grid{grid-template-columns:1fr;padding:0 20px 40px}}

/* 卡片 - 极简扁平 */
.card{
  background:var(--card);
  border-radius:12px;
  padding:24px;
  border:1px solid var(--border);
  transition:all .2s ease;
  cursor:default;
}
.card:hover{
  border-color:#d0d0d0;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

/* 顶部区域 */
.card-upper{
  display:flex;
  align-items:flex-start;
  gap:16px;
  margin-bottom:16px;
}
.big-letter{
  font-family:'Playfair Display',serif;
  font-size:56px;
  font-weight:700;
  line-height:1;
  flex-shrink:0;
  width:60px;
  color:var(--accent);
}
.card-info{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
  min-width:0;
  padding-top:4px;
}
.cn-main{
  font-size:18px;
  font-weight:600;
  color:var(--text);
  line-height:1.4;
}
.note-text{
  font-size:13px;
  color:var(--text2);
  line-height:1.5;
}

/* 底部区域 */
.card-lower{
  display:flex;
  align-items:center;
  gap:12px;
  padding-top:16px;
  border-top:1px solid var(--border);
}
.ipa{
  font-family:'Inter',sans-serif;
  font-size:20px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.5px;
  flex-shrink:0;
  min-width:50px;
}

/* 播放按钮 - 简洁 */
.play-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 16px;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s ease;
  border:none;
  font-family:inherit;
}
.play-btn:hover{
  background:#333;
}
.play-btn:active{
  transform:scale(0.98);
}
.play-btn svg{
  width:14px;
  height:14px;
  fill:currentColor;
}
.play-btn.playing{
  background:#444;
}
.play-btn.playing svg{
  animation:pulse 1.2s ease infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* 分类标签 - 简洁 */
.tag{
  margin-left:auto;
  font-size:11px;
  font-weight:600;
  padding:5px 10px;
  border-radius:6px;
  white-space:nowrap;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.tag.vowel{
  background:var(--vowel-bg);
  color:var(--vowel);
}
.tag.consonant{
  background:var(--consonant-bg);
  color:var(--consonant);
}
.tag.diphthong{
  background:var(--diphthong-bg);
  color:var(--diphthong);
}

/* 入场动画 */
.card{
  opacity:0;
  animation:fadeUp .5s ease forwards;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* 错误提示 */
.audio-error{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:#1a1a1a;
  color:#fff;
  padding:12px 24px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  display:none;
  z-index:100;
}
.audio-error.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* 页脚 */
.footer{
  text-align:center;
  padding:40px;
  color:var(--text3);
  font-size:13px;
  border-top:1px solid var(--border);
}
.footer a{
  color:var(--text);
  text-decoration:underline;
  text-underline-offset:3px;
}
</style>
<script src="nav.js"></script>
</head>
<body>

<div class="header">
  <h1>48 音标速查表</h1>
  <div class="sub">Phonetic Symbols · 标准发音</div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  音频来源：<a href="https://www.xdf.cn" target="_blank">新东方</a> · 外教标准发音
</div>

<div class="audio-error" id="audioError">无法播放音频，请检查网络连接</div>

<script>
// 新东方音标音频基础URL
var AUDIO_BASE_URL='https://www.xdf.cn/zhuanti/bd-phonetic-alphabet-card/';

// 音标数据 - 按字母顺序排列，包含新东方真实音频文件名
var DATA=[
  // 1. a → /æ/
  {l:["a"],ip:"/æ/",cn:"埃（短促，嘴张大）",note:"类似「安」的起音，但嘴向两边咧",cat:"vowel",audio:"0d692636a009ea99b9f9.mp3"},
  // 2. a_e, ai, ay → /eɪ/
  {l:["a_e","ai","ay"],ip:"/eɪ/",cn:"诶一",note:"先发「诶」滑向「一」",cat:"diphthong",audio:"28dc047b815750a6c5ee.mp3"},
  // 3. ar → /ɑː/
  {l:["ar"],ip:"/ɑː/",cn:"啊（长）",note:"嘴张大，舌放平",cat:"vowel",audio:"db4b962669f0c8e54737.mp3"},
  // 4. b → /b/
  {l:["b"],ip:"/b/",cn:"波",note:"浊辅音，声带振动",cat:"consonant",audio:"f80e74ce936868ba6237.mp3"},
  // 5. c, k → /k/
  {l:["c","k"],ip:"/k/",cn:"克",note:"清辅音，送气",cat:"consonant",audio:"2d9c9b3d1ecdf33d659a.mp3"},
  // 6. ch, tch → /tʃ/
  {l:["ch","tch"],ip:"/tʃ/",cn:"吃",note:"清辅音，舌尖翘起",cat:"consonant",audio:"a8bd1716350ce6be0735.mp3"},
  // 7. d → /d/
  {l:["d"],ip:"/d/",cn:"的",note:"浊辅音",cat:"consonant",audio:"9a351a93fddb04c95162.mp3"},
  // 8. dr → /dr/
  {l:["dr"],ip:"/dr/",cn:"捉",note:"类似「朱」但更浊",cat:"consonant",audio:"f981507e87b07895a224.mp3"},
  // 9. ds → /dz/
  {l:["ds"],ip:"/dz/",cn:"子",note:"浊辅音，类似「资」但更轻",cat:"consonant",audio:"a9879c494d9159bdd679.mp3"},
  // 10. e → /e/
  {l:["e"],ip:"/e/",cn:"诶（短）",note:"嘴半张，类似「叶」的韵母",cat:"vowel",audio:"51f575eab8eb20b5fbf7.mp3"},
  // 11. ee, ea → /iː/
  {l:["ee","ea"],ip:"/iː/",cn:"衣（长）",note:"嘴角向两边，微笑状",cat:"vowel",audio:"496fa8c5b185e9d155d7.mp3"},
  // 12. ear, eer → /ɪə/
  {l:["ear","eer"],ip:"/ɪə/",cn:"衣-儿",note:"从「衣」滑向「儿」",cat:"diphthong",audio:"6ff61b12d4e985c668ac.mp3"},
  // 13. er, ir, ur → /ɜː/
  {l:["er","ir","ur"],ip:"/ɜː/",cn:"饿（长）",note:"舌头中部抬起，嘴唇扁平",cat:"vowel",audio:"2b2c11bd1dcf81f786f0.mp3"},
  // 14. f → /f/
  {l:["f"],ip:"/f/",cn:"夫",note:"上齿咬下唇，送气",cat:"consonant",audio:"a4209e9d9fd9709a1e76.mp3"},
  // 15. g → /g/
  {l:["g"],ip:"/g/",cn:"哥",note:"浊辅音",cat:"consonant",audio:"9f1f33f7bd448e4b2262.mp3"},
  // 16. ge, dge → /dʒ/
  {l:["ge","dge"],ip:"/dʒ/",cn:"知",note:"浊辅音，类似「枝」但更浊",cat:"consonant",audio:"70e57979284156031990.mp3"},
  // 17. h → /h/
  {l:["h"],ip:"/h/",cn:"呵",note:"清辅音，喉部摩擦",cat:"consonant",audio:"fc7ee36388f605e0a8c6.mp3"},
  // 18. i → /ɪ/
  {l:["i"],ip:"/ɪ/",cn:"衣（短促）",note:"比长「衣」嘴略开，舌头稍后缩",cat:"vowel",audio:"9eeb45ac15980f053465.mp3"},
  // 19. i_e, y → /aɪ/
  {l:["i_e","y"],ip:"/aɪ/",cn:"爱一",note:"从「爱」滑向「一」",cat:"diphthong",audio:"a83bc6c3a61e526de4ba.mp3"},
  // 20. j → /dʒ/
  {l:["j"],ip:"/dʒ/",cn:"知",note:"同 ge",cat:"consonant",audio:"70e57979284156031990.mp3"},
  // 21. l（清晰）→ /l/
  {l:["l（清晰）"],ip:"/l/",cn:"乐",note:"舌尖抵上齿龈，声带振动",cat:"consonant",audio:"a4c2272a2e766194a4a1.mp3"},
  // 22. l（模糊）→ /l/ (dark)
  {l:["l（模糊）"],ip:"/l/",cn:"欧",note:"舌后抬起，类似「欧」但不圆唇",cat:"consonant",audio:"a4c2272a2e766194a4a1.mp3"},
  // 23. m → /m/
  {l:["m"],ip:"/m/",cn:"呣",note:"双唇闭拢，鼻音",cat:"consonant",audio:"01ef4567a1aa014ae30a.mp3"},
  // 24. n → /n/
  {l:["n"],ip:"/n/",cn:"嗯（前）",note:"舌尖抵上齿龈，鼻音",cat:"consonant",audio:"7f9f8679b25155de6b47.mp3"},
  // 25. ng → /ŋ/
  {l:["ng"],ip:"/ŋ/",cn:"嗯（后）",note:"舌后部抵软腭，鼻音",cat:"consonant",audio:"9f10d5b95482af1e9815.mp3"},
  // 26. o → /ɒ/
  {l:["o"],ip:"/ɒ/",cn:"奥（短）",note:"嘴张大，舌后缩，类似「哦」但更短",cat:"vowel",audio:"9bf1a8bbcfc0c68ee326.mp3"},
  // 27. o_e, oa, ow → /əʊ/
  {l:["o_e","oa","ow"],ip:"/əʊ/",cn:"欧",note:"从「呃」滑向「乌」",cat:"diphthong",audio:"eae06d0db4f09c8f142c.mp3"},
  // 28. oi, oy → /ɔɪ/
  {l:["oi","oy"],ip:"/ɔɪ/",cn:"奥一",note:"从「奥」滑向「一」",cat:"diphthong",audio:"c037f2e2fa30fc2711b8.mp3"},
  // 29. oo（长）→ /uː/
  {l:["oo（长）"],ip:"/uː/",cn:"乌（长）",note:"嘴唇收圆向前突",cat:"vowel",audio:"45f67d333cfcb525cd4f.mp3"},
  // 30. oo（短）→ /ʊ/
  {l:["oo（短）"],ip:"/ʊ/",cn:"乌（短）",note:"比长「乌」嘴略开，舌头稍后",cat:"vowel",audio:"ef8b714cea50701066b8.mp3"},
  // 31. or, au, aw → /ɔː/
  {l:["or","au","aw"],ip:"/ɔː/",cn:"奥（长）",note:"嘴圆，舌头后缩",cat:"vowel",audio:"bdd75c97619e90b5035d.mp3"},
  // 32. ou, ow → /aʊ/
  {l:["ou","ow"],ip:"/aʊ/",cn:"啊乌",note:"从「啊」滑向「乌」",cat:"diphthong",audio:"8088e9346a7f75cb9b3c.mp3"},
  // 33. p → /p/
  {l:["p"],ip:"/p/",cn:"扑",note:"清辅音，送气",cat:"consonant",audio:"de1d50e7127182f7704d.mp3"},
  // 34. qu → /kw/
  {l:["qu"],ip:"/kw/",cn:"阔",note:"半元音，快速读「科乌」",cat:"consonant",audio:"2d9c9b3d1ecdf33d659a.mp3"},
  // 35. r → /r/
  {l:["r"],ip:"/r/",cn:"若",note:"舌尖卷起不碰口腔，声带振动",cat:"consonant",audio:"b6c52369def91ab36852.mp3"},
  // 36. s → /s/
  {l:["s"],ip:"/s/",cn:"嘶",note:"清辅音，舌尖接近上齿",cat:"consonant",audio:"9b0599891bade0c04c46.mp3"},
  // 37. sh, ci, ti → /ʃ/
  {l:["sh","ci","ti"],ip:"/ʃ/",cn:"师",note:"清辅音，舌尖翘起",cat:"consonant",audio:"c4a898ad851940132475.mp3"},
  // 38. t → /t/
  {l:["t"],ip:"/t/",cn:"特",note:"清辅音",cat:"consonant",audio:"5df0fde0b4fd99cee219.mp3"},
  // 39. th（清）→ /θ/
  {l:["th（清）"],ip:"/θ/",cn:"斯（咬舌）",note:"舌尖轻咬，送气",cat:"consonant",audio:"d994b922bc7ec82646ff.mp3"},
  // 40. th（浊）→ /ð/
  {l:["th（浊）"],ip:"/ð/",cn:"泽（咬舌）",note:"舌尖轻咬，声带振动",cat:"consonant",audio:"ab9c619dfb987add2069.mp3"},
  // 41. tr → /tr/
  {l:["tr"],ip:"/tr/",cn:"戳",note:"清辅音，类似「出」",cat:"consonant",audio:"4fad2aa8319f96b7034c.mp3"},
  // 42. ts → /ts/
  {l:["ts"],ip:"/ts/",cn:"次",note:"清辅音",cat:"consonant",audio:"b854e5495600f691d169.mp3"},
  // 43. v → /v/
  {l:["v"],ip:"/v/",cn:"呜（咬唇）",note:"上齿咬下唇，声带振动",cat:"consonant",audio:"1ee6a0a833eb5f5c40b4.mp3"},
  // 44. w → /w/
  {l:["w"],ip:"/w/",cn:"我",note:"半元音，快速读「乌」+「额」",cat:"consonant",audio:"4e6d33cbf2ba6dfb91b7.mp3"},
  // 45. y → /j/
  {l:["y"],ip:"/j/",cn:"也",note:"半元音，快速读「衣」+「额」",cat:"consonant",audio:"fe61e7decb7acb2e0d8b.mp3"},
  // 46. z → /z/
  {l:["z"],ip:"/z/",cn:"兹",note:"浊辅音",cat:"consonant",audio:"21d839e770c9a38de14a.mp3"},
  // 47. s（vision）→ /ʒ/
  {l:["s（vision）"],ip:"/ʒ/",cn:"日",note:"浊辅音，类似「日」但不卷舌",cat:"consonant",audio:"69df71ab3487efcb6bfa.mp3"},
  // 48. ure, oor → /ʊə/
  {l:["ure","oor"],ip:"/ʊə/",cn:"乌-儿",note:"从短「乌」滑向「儿」",cat:"diphthong",audio:"1c01bd93c34338ca2081.mp3"},
];

var CAT_LABEL={vowel:"元音",consonant:"辅音",diphthong:"双元音"};

var speakerSVG='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0011 7.5v1.07a3.49 3.49 0 010 6.86V16.5a4.49 4.49 0 005.5-4.5zM14 3.23v2.06a6.51 6.51 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>';

// 音频播放器
var currentAudio=null;

function playAudio(audioFile,btn){
  // 停止当前播放
  if(currentAudio){
    currentAudio.pause();
    currentAudio=null;
  }
  
  // 移除所有playing状态
  document.querySelectorAll('.play-btn').forEach(function(b){b.classList.remove('playing');});
  
  // 创建新音频
  var audio=new Audio(AUDIO_BASE_URL+audioFile);
  currentAudio=audio;
  
  btn.classList.add('playing');
  
  audio.onended=function(){
    btn.classList.remove('playing');
    currentAudio=null;
  };
  
  audio.onerror=function(){
    btn.classList.remove('playing');
    showError('音频加载失败，请检查网络');
    currentAudio=null;
  };
  
  audio.play().catch(function(e){
    btn.classList.remove('playing');
    showError('播放失败，请重试');
    currentAudio=null;
  });
}

function showError(msg){
  var err=document.getElementById('audioError');
  err.textContent=msg;
  err.classList.add('show');
  setTimeout(function(){err.classList.remove('show');},4000);
}

// 渲染卡片
var grid=document.getElementById('grid');
DATA.forEach(function(d,i){
  var card=document.createElement('div');
  card.className='card';
  card.style.animationDelay=(i*20)+'ms';
  var letters=d.l.map(function(x,j){return j>0?' / '+x:x;}).join('');
  
  card.innerHTML=
    '<div class="card-upper">'+
      '<div class="big-letter">'+letters.charAt(0)+'</div>'+
      '<div class="card-info">'+
        '<div class="cn-main">'+d.cn+'</div>'+
        '<div class="note-text">'+d.note+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="card-lower">'+
      '<span class="ipa">'+d.ip+'</span>'+
      '<button class="play-btn" data-audio="'+d.audio+'">'+speakerSVG+'<span>播放</span></button>'+
      '<span class="tag '+d.cat+'">'+CAT_LABEL[d.cat]+'</span>'+
    '</div>';
  
  grid.appendChild(card);
});

// 绑定点击事件
document.querySelectorAll('.play-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var audioFile=this.dataset.audio;
    playAudio(audioFile,this);
  });
});
</script>
</body>
</html>
