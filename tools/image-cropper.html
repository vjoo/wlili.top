    <!-- Drop Zone -->

      <!-- Canvas Area -->
      <div class="canvas-area">

          </button>
          <button class="side-btn" onclick="flipImage()" title="水平镜像">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>

          <button class="side-btn" onclick="resetCrop()" title="重置裁切">

<div class="toast" id="toast"></div>

<script>
/* ============================================
   WLi Tools - 在线工具集
   © 2025 WLi. All rights reserved.
   Developer: WLi
   ============================================ */
(function() {
  // ─── Global State ─────────────────────────
  let originalImage = null;
  let currentFile = null;
  let canvas = document.getElementById('canvas');
  let ctx = canvas.getContext('2d');
  let cropOverlay = document.getElementById('cropOverlay');
  let cropRect = { x: 0, y: 0, w: 0, h: 0 };
  let exportFormat = 'png';
  let currentRatio = 'free';
  let isDragging = false;
  let isResizing = false;
  let resizeHandle = null;
  let dragStart = { x: 0, y: 0 };
  let cropStart = { x: 0, y: 0, w: 0, h: 0 };
  let rotation = 0;
  let flipH = false;
  let gifFrames = null;      // parsed GIF frames (null if not animated)
  let gifDelays = null;      // frame delays in ms

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const toastEl = document.getElementById('toast');

  // ─── Restore from sessionStorage on page load ─────────────────────────
  (function restoreSession() {
    const savedImage = sessionStorage.getItem('cropper_image');
    if (savedImage) {
      rotation = parseInt(sessionStorage.getItem('cropper_rotation') || '0');
      flipH = sessionStorage.getItem('cropper_flipH') === 'true';
      currentFile = { name: sessionStorage.getItem('cropper_filename') || 'image.png' };
      originalImage = new Image();
      originalImage.onload = () => {
        initEditor();
      };
      originalImage.src = savedImage;
    }
  })();

  // ─── Helpers ─────────────────────────────
  function formatBytes(bytes) {
    if (!bytes && bytes !== 0) return '--';
    if (bytes === 0) return '0 B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    if (kb >= 1) return kb.toFixed(1) + ' KB';
    return bytes + ' B';
  }

  function gcd(a, b) {
    a = Math.abs(Math.round(a));
    b = Math.abs(Math.round(b));
    while (b) { [a, b] = [b, a % b]; }
    return a;
  }

  function computeAspectRatio(w, h) {
    if (w <= 0 || h <= 0) return '--';
    const g = gcd(w, h);
    const rw = w / g;
    const rh = h / g;
    // If the simplified ratio is too large, show decimal
    if (rw > 50 || rh > 50) {
      return (w / h).toFixed(2) + ':1';
    }
    return rw + ':' + rh;
  }

  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ─── Upload Events ───────────────────────
  let touchStartY = 0;
  let touchHandled = false;

  dropzone.addEventListener('click', (e) => {
    if (touchHandled) { touchHandled = false; return; }
    fileInput.click();
  });
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
  });
  dropzone.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; dropzone.style.transform = 'scale(0.98)'; }, { passive: true });
  dropzone.addEventListener('touchend', (e) => {
    dropzone.style.transform = '';
    if (Math.abs(e.changedTouches[0].clientY - touchStartY) < 10) { touchHandled = true; fileInput.click(); }
  }, { passive: true });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (file.type === 'application/pdf') {
      // PDF: 用 pdf.js 渲染第一页为图片
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);
        pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
          pdf.getPage(1).then(function(page) {
            const scale = 2;
            const viewport = page.getViewport({ scale: scale });
            const pdfCanvas = document.createElement('canvas');
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            const pdfCtx = pdfCanvas.getContext('2d');
            page.render({ canvasContext: pdfCtx, viewport: viewport }).promise.then(function() {
              const dataURL = pdfCanvas.toDataURL('image/png');
              currentFile = { name: file.name.replace(/\.pdf$/i, '.png') };
              sessionStorage.setItem('cropper_image', dataURL);
              sessionStorage.setItem('cropper_filename', currentFile.name);
              originalImage = new Image();
              originalImage.onload = function() { initEditor(); };
              originalImage.src = dataURL;
            });
          });
        }).catch(function(err) {
          showToast('PDF 解析失败：' + err.message);
        });
      };
      reader.readAsArrayBuffer(file);
      return;
    }
    if (!file.type.startsWith('image/')) {
      // Check file extension for SVG (some browsers don't set MIME type)
      if (file.name.match(/\.svg$/i)) {
        // Treat as SVG
      } else {
        showToast('不支持的文件格式');
        return;
      }
    }
    currentFile = file;
    // Reset GIF state
    gifFrames = null;
    gifDelays = null;

    // For GIF files, parse animation frames
    if (file.type === 'image/gif') {
      const gifReader = new FileReader();
      gifReader.onload = (abEvent) => {
        try {
          const gif = gifuct.parseGIF(abEvent.target.result);
          const frames = gifuct.decompressFrames(gif, true);
          if (frames.length > 1) {
            // Animated GIF - store frames
            const gifW = gif.lsd.width;
            const gifH = gif.lsd.height;
            gifDelays = frames.map(f => (f.delay || 10) * 10); // centiseconds → ms
            gifFrames = frames.map(f => {
              const c = document.createElement('canvas');
              c.width = gifW;
              c.height = gifH;
              const ctx = c.getContext('2d');
              const imgData = ctx.createImageData(gifW, gifH);
              imgData.data.set(f.patch);
              ctx.putImageData(imgData, 0, 0);
              return c;
            });
          }
        } catch(e) {
          console.warn('GIF parse failed, fallback to static:', e);
        }
        // Load first frame as preview image
        loadGifPreview(file);
      };
      gifReader.readAsArrayBuffer(file);
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      sessionStorage.setItem('cropper_image', e.target.result);
      sessionStorage.setItem('cropper_filename', file.name);
      originalImage = new Image();
      originalImage.onload = () => {
        initEditor();
      };
      originalImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function loadGifPreview(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      sessionStorage.setItem('cropper_image', e.target.result);
      sessionStorage.setItem('cropper_filename', file.name);
      originalImage = new Image();
      originalImage.onload = () => {
        initEditor();
      };
      originalImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function initEditor() {
    dropzone.classList.add('hidden');
    document.getElementById('editorArea').classList.add('active');

    // Update image info stats
    updateImageStats();
    renderCanvas();

    // Persist state
    sessionStorage.setItem('cropper_rotation', rotation);
    sessionStorage.setItem('cropper_flipH', flipH);
  }

  function updateImageStats() {
    if (!originalImage || !currentFile) return;
    let w = originalImage.width;
    let h = originalImage.height;
    if (rotation % 180 !== 0) { [w, h] = [h, w]; }

    document.getElementById('statResolution').textContent = w + ' \u00d7 ' + h;
    document.getElementById('statRatio').textContent = computeAspectRatio(w, h);
    document.getElementById('statFileSize').textContent = formatBytes(currentFile.size);

    // Truncate filename if too long
    let name = currentFile.name;
    if (name.length > 20) {
      const ext = name.lastIndexOf('.');
      if (ext > 0) {
        name = name.substring(0, 17) + '...' + name.substring(ext);
      } else {
        name = name.substring(0, 20) + '...';
      }
    }
    document.getElementById('statFileName').textContent = name;
    document.getElementById('statFileName').title = currentFile.name;
  }

  function renderCanvas() {
    if (!originalImage) return;

    let imgWidth = originalImage.width;
    let imgHeight = originalImage.height;

    // Account for rotation
    if (rotation % 180 !== 0) {
      [imgWidth, imgHeight] = [imgHeight, imgWidth];
    }

    // Canvas uses full original resolution — CSS scales it down for display
    canvas.width = imgWidth;
    canvas.height = imgHeight;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rotation * Math.PI / 180);
    if (flipH) {
      ctx.scale(-1, 1);
    }
    ctx.drawImage(originalImage, -originalImage.width / 2, -originalImage.height / 2);
    ctx.restore();

    // Update overlay viewBox (SVG scales via CSS width/height: 100%)
    cropOverlay.setAttribute('viewBox', '0 0 ' + canvas.width + ' ' + canvas.height);

    // Initialize crop rect
    initCropRect();
    updateOverlay();
  }

  function initCropRect() {
    const padding = 0;
    const maxW = canvas.width - padding * 2;
    const maxH = canvas.height - padding * 2;

    if (currentRatio === 'free') {
      cropRect = { x: padding, y: padding, w: maxW, h: maxH };
    } else {
      const ratio = currentRatio;
      let w, h;
      if (maxW / maxH > ratio) {
        h = maxH;
        w = h * ratio;
      } else {
        w = maxW;
        h = w / ratio;
      }
      cropRect = {
        x: (canvas.width - w) / 2,
        y: (canvas.height - h) / 2,
        w: w,
        h: h
      };
    }
  }

  function updateOverlay() {
    const { x, y, w, h } = cropRect;
    const cw = canvas.width;
    const ch = canvas.height;
    // Mask path
    const maskPath = 'M0,0 L' + cw + ',0 L' + cw + ',' + ch + ' L0,' + ch + ' Z M' + x + ',' + y + ' L' + x + ',' + (y + h) + ' L' + (x + w) + ',' + (y + h) + ' L' + (x + w) + ',' + y + ' Z';
    document.getElementById('cropMask').setAttribute('d', maskPath);

    // Crop frame
    document.getElementById('cropFrame').setAttribute('x', x);
    document.getElementById('cropFrame').setAttribute('y', y);
    document.getElementById('cropFrame').setAttribute('width', w);
    document.getElementById('cropFrame').setAttribute('height', h);

    // Handles — dynamically sized based on CSS display scale so they look the same on all resolutions
    const overlayRect = cropOverlay.getBoundingClientRect();
    const svgScale = canvas.width / overlayRect.width;
    const handleR = 18 * svgScale;        // 18 CSS px visual radius
    const handleInset = 24 * svgScale;     // 24 CSS px visual inset from corners
    ['handleNW','handleNE','handleSW','handleSE'].forEach(id => {
      document.getElementById(id).setAttribute('r', handleR);
    });
    document.getElementById('handleNW').setAttribute('cx', x + handleInset);
    document.getElementById('handleNW').setAttribute('cy', y + handleInset);
    document.getElementById('handleNE').setAttribute('cx', x + w - handleInset);
    document.getElementById('handleNE').setAttribute('cy', y + handleInset);
    document.getElementById('handleSW').setAttribute('cx', x + handleInset);
    document.getElementById('handleSW').setAttribute('cy', y + h - handleInset);
    document.getElementById('handleSE').setAttribute('cx', x + w - handleInset);
    document.getElementById('handleSE').setAttribute('cy', y + h - handleInset);

    // Update crop info inputs (always visible now)
    document.getElementById('cropInfoW').value = Math.round(w) || '';
    document.getElementById('cropInfoH').value = Math.round(h) || '';
  }

  // ─── Ratio Selection ─────────────────────
  let isCustomSize = false;
  document.querySelectorAll('#ratioGroup button').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.ratio;
      document.querySelectorAll('#ratioGroup button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      isCustomSize = false;
      if (val === 'free') {
        currentRatio = 'free';
      } else {
        const parts = val.split(':');
        currentRatio = parseInt(parts[0]) / parseInt(parts[1]);
      }
      initCropRect();
      updateOverlay();
    });
  });

  function setRatio(ratio) {
    currentRatio = ratio;
    document.querySelectorAll('#ratioGroup button').forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.ratio === (ratio === 'free' ? 'free' : ratio.toString())) {
        btn.classList.add('active');
      }
    });
    initCropRect();
    updateOverlay();
  }

  // ─── Rotate & Reset ──────────────────────
  window.rotateImage = function(deg) {
    rotation = (rotation + deg) % 360;
    sessionStorage.setItem('cropper_rotation', rotation);
    updateImageStats();
    renderCanvas();
  };

  window.flipImage = function() {
    flipH = !flipH;
    sessionStorage.setItem('cropper_flipH', flipH);
    renderCanvas();
  };

  window.resetCrop = function() {
    rotation = 0;
    flipH = false;
    currentRatio = 'free';
    document.querySelectorAll('#ratioGroup button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.ratio === 'free');
    });
    // Exit custom size mode if active
    if (isCustomSize) {
      isCustomSize = false;
    }
    updateImageStats();
    renderCanvas();
    showToast('已重置裁切');
  };

  window.changeImage = function() {
    gifFrames = null;
    gifDelays = null;
    sessionStorage.removeItem('cropper_image');
    sessionStorage.removeItem('cropper_filename');
    sessionStorage.removeItem('cropper_rotation');
    sessionStorage.removeItem('cropper_flipH');
    fileInput.click();
  };

  // ─── Format Selection ─────────────────────
  document.querySelectorAll('#formatGroup button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#formatGroup button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      exportFormat = btn.dataset.fmt;
    });
  });

  // ─── Quality Slider ─────────────────────
  const qualitySlider = document.getElementById('qualitySlider');
  const qualityVal = document.getElementById('qualityVal');
  qualitySlider.addEventListener('input', () => {
    qualityVal.textContent = qualitySlider.value + '%';
  });

  // ─── Crop Info Input ─────────────────────
  // When user manually edits the inputs, switch to custom size mode
  let inputEditing = false;
  function onCropInfoInput() {
    if (!inputEditing) {
      inputEditing = true;
      // Deselect all ratio buttons (user is now in custom mode)
      document.querySelectorAll('#ratioGroup button').forEach(b => b.classList.remove('active'));
      isCustomSize = true;
    }
  }
  function onCropInfoChange() {
    inputEditing = false;
    const w = parseInt(document.getElementById('cropInfoW').value);
    const h = parseInt(document.getElementById('cropInfoH').value);
    if (!w || !h || w <= 0 || h <= 0) {
      showToast('请输入有效的宽高数值');
      return;
    }
    isCustomSize = true;
    currentRatio = w / h;
    // Resize crop rect to match the requested dimensions (fit within canvas)
    const maxW = canvas.width;
    const maxH = canvas.height;
    let newW = w, newH = h;
    if (newW > maxW || newH > maxH) {
      const r = Math.min(maxW / newW, maxH / newH);
      newW = Math.round(newW * r);
      newH = Math.round(newH * r);
    }
    cropRect = {
      x: Math.round((canvas.width - newW) / 2),
      y: Math.round((canvas.height - newH) / 2),
      w: newW,
      h: newH
    };
    updateOverlay();
  }
  document.getElementById('cropInfoW').addEventListener('input', onCropInfoInput);
  document.getElementById('cropInfoH').addEventListener('input', onCropInfoInput);
  document.getElementById('cropInfoW').addEventListener('change', onCropInfoChange);
  document.getElementById('cropInfoH').addEventListener('change', onCropInfoChange);
  document.getElementById('cropInfoW').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('cropInfoH').focus(); });
  document.getElementById('cropInfoH').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('cropInfoH').blur(); });

  // Reset button: restore to current ratio's recommended size
  document.getElementById('cropInfoReset').addEventListener('click', () => {
    inputEditing = false;
    isCustomSize = false;
    // Re-select the last active ratio button (or free)
    const activeBtn = document.querySelector('#ratioGroup button.active');
    if (activeBtn) {
      const val = activeBtn.dataset.ratio;
      if (val === 'free') {
        currentRatio = 'free';
      } else {
        const parts = val.split(':');
        currentRatio = parseInt(parts[0]) / parseInt(parts[1]);
      }
    } else {
      currentRatio = 'free';
      document.querySelector('#ratioGroup button[data-ratio="free"]').classList.add('active');
    }
    initCropRect();
    updateOverlay();
  });

  // ─── Download ─────────────────────────────
  window.downloadCrop = function() {
    if (!originalImage) return;
    // cropRect is already in original image pixels
    const sx = cropRect.x;
    const sy = cropRect.y;
    const sw = cropRect.w;
    const sh = cropRect.h;
    const baseName = currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'image';

    // ── PDF export ──
    if (exportFormat === 'pdf') {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: sw > sh ? 'landscape' : 'portrait',
        unit: 'px',
        format: [Math.round(sw), Math.round(sh)]
      });
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = Math.round(sw);
      tmpCanvas.height = Math.round(sh);
      const tmpCtx = tmpCanvas.getContext('2d');
      tmpCtx.save();
      // White background for PDF (uses JPEG internally, no alpha support)
      tmpCtx.fillStyle = '#ffffff';
      tmpCtx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
      tmpCtx.translate(tmpCanvas.width / 2, tmpCanvas.height / 2);
      tmpCtx.rotate(-rotation * Math.PI / 180);
      if (flipH) tmpCtx.scale(-1, 1);
      tmpCtx.drawImage(originalImage, -sx - sw / 2, -sy - sh / 2);
      tmpCtx.restore();
      const imgData = tmpCanvas.toDataURL('image/jpeg', parseInt(qualitySlider.value) / 100);
      pdf.addImage(imgData, 'JPEG', 0, 0, Math.round(sw), Math.round(sh));
      pdf.save(baseName + '_cropped.pdf');
      showToast('裁切图片已下载（PDF）');
      return;
    }

    // ── Animated GIF export ──
    if (exportFormat === 'gif' && gifFrames && gifFrames.length > 1) {
      const gifW = gifFrames[0].width;
      const gifH = gifFrames[0].height;
      const scaleX = sw / gifW;
      const scaleY = sh / gifH;
      const cropX = sx / scaleX;
      const cropY = sy / scaleY;
      const cropW = sw / scaleX;
      const cropH = sh / scaleY;

      const encoder = new GIF({
        workers: 2,
        quality: Math.max(1, Math.round(31 - (parseInt(qualitySlider.value) * 30 / 100))),
        width: Math.round(cropW),
        height: Math.round(cropH),
        transparent: 0x000000,
        workerURL: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
      });

      // Process each frame
      let frameCount = 0;
      gifFrames.forEach((frameCanvas, idx) => {
        const fc = document.createElement('canvas');
        fc.width = Math.round(cropW);
        fc.height = Math.round(cropH);
        const fctx = fc.getContext('2d');
        fctx.save();
        fctx.translate(fc.width / 2, fc.height / 2);
        fctx.rotate(-rotation * Math.PI / 180);
        if (flipH) fctx.scale(-1, 1);
        fctx.drawImage(frameCanvas, -cropX - cropW / 2, -cropY - cropH / 2);
        fctx.restore();
        encoder.addFrame(fctx, { delay: gifDelays[idx], copy: true, dispose: 1 });
        frameCount++;
        // Safety limit: max 200 frames
        if (frameCount >= 200) return;
      });

      encoder.on('progress', p => {
        if (p < 1) showToast('GIF 编码中… ' + Math.round(p * 100) + '%');
      });
      encoder.on('finished', blob => {
        const link = document.createElement('a');
        link.download = baseName + '_cropped.gif';
        link.href = URL.createObjectURL(blob);
        link.click();
        showToast('动图已下载（' + frameCount + ' 帧）');
      });
      encoder.render();
      return;
    }

    // ── Static image export (JPEG/PNG/WebP/static GIF) ──
    const resultCanvas = document.createElement('canvas');
    resultCanvas.width = Math.round(sw);
    resultCanvas.height = Math.round(sh);
    const rctx = resultCanvas.getContext('2d');

    rctx.save();
    // White background for JPEG (no alpha support)
    if (exportFormat === 'jpeg') {
      rctx.fillStyle = '#ffffff';
      rctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
    }
    rctx.translate(resultCanvas.width / 2, resultCanvas.height / 2);
    rctx.rotate(-rotation * Math.PI / 180);
    if (flipH) {
      rctx.scale(-1, 1);
    }
    rctx.drawImage(originalImage, -sx - sw / 2, -sy - sh / 2);
    rctx.restore();

    const link = document.createElement('a');
    const fmt = exportFormat === 'gif' ? 'png' : exportFormat; // static GIF → PNG
    const mimeType = fmt === 'jpeg' ? 'image/jpeg' : fmt === 'webp' ? 'image/webp' : 'image/png';
    const ext = fmt === 'jpeg' ? 'jpg' : fmt;
    const qualityVal_pct = parseInt(qualitySlider.value) / 100;
    const quality = (fmt === 'jpeg' || fmt === 'webp') ? qualityVal_pct : undefined;
    link.download = baseName + '_cropped.' + ext;
    link.href = resultCanvas.toDataURL(mimeType, quality);
    link.click();
    showToast('裁切图片已下载（' + ext.toUpperCase() + '）');
  };

  // ─── Mouse Interaction ───────────────────
  function getCanvasCoords(clientX, clientY) {
    const rect = cropOverlay.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  }

  cropOverlay.addEventListener('mousedown', (e) => {
    const { x, y } = getCanvasCoords(e.clientX, e.clientY);
    const { x: cx, y: cy, w: cw, h: ch } = cropRect;
    const rect = cropOverlay.getBoundingClientRect();
    const handleSizeCSS = 28;
    const handleScale = canvas.width / rect.width;
    const handleSize = handleSizeCSS * handleScale;
    const handleInset = 24 * handleScale;
    // Handles are positioned inside the corners at inset distance
    if (Math.abs(x - (cx + handleInset)) < handleSize && Math.abs(y - (cy + handleInset)) < handleSize) {
      isResizing = true; resizeHandle = 'nw';
    } else if (Math.abs(x - (cx + cw - handleInset)) < handleSize && Math.abs(y - (cy + handleInset)) < handleSize) {
      isResizing = true; resizeHandle = 'ne';
    } else if (Math.abs(x - (cx + handleInset)) < handleSize && Math.abs(y - (cy + ch - handleInset)) < handleSize) {
      isResizing = true; resizeHandle = 'sw';
    } else if (Math.abs(x - (cx + cw - handleInset)) < handleSize && Math.abs(y - (cy + ch - handleInset)) < handleSize) {
      isResizing = true; resizeHandle = 'se';
    } else if (x >= cx && x <= cx + cw && y >= cy && y <= cy + ch) {
      isDragging = true;
    }

    dragStart = { x, y };
    cropStart = { ...cropRect };
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging && !isResizing) return;

    const { x, y } = getCanvasCoords(e.clientX, e.clientY);
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;

    if (isDragging) {
      cropRect.x = Math.max(0, Math.min(cropStart.x + dx, canvas.width - cropRect.w));
      cropRect.y = Math.max(0, Math.min(cropStart.y + dy, canvas.height - cropRect.h));
    } else if (isResizing) {
      const minSize = Math.max(10, Math.min(canvas.width, canvas.height) * 0.02);
      let newX = cropStart.x, newY = cropStart.y, newW = cropStart.w, newH = cropStart.h;

      switch (resizeHandle) {
        case 'se':
          newW = Math.max(minSize, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h + dy) : newW / currentRatio;
          break;
        case 'nw':
          newW = Math.max(minSize, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h - dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'ne':
          newW = Math.max(minSize, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h - dy) : newW / currentRatio;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'sw':
          newW = Math.max(minSize, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h + dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          break;
      }

      if (newX < 0) { newW += newX; newX = 0; }
      if (newY < 0) { newH += newY; newY = 0; }
      if (newX + newW > canvas.width) newW = canvas.width - newX;
      if (newY + newH > canvas.height) newH = canvas.height - newY;

      cropRect = { x: newX, y: newY, w: Math.max(minSize, newW), h: Math.max(minSize, newH) };
    }

    updateOverlay();
  });

  function snapToEdges() {
    const threshold = 12;
    if (cropRect.x < threshold) cropRect.x = 0;
    if (cropRect.y < threshold) cropRect.y = 0;
    if (canvas.width - (cropRect.x + cropRect.w) < threshold) cropRect.x = canvas.width - cropRect.w;
    if (canvas.height - (cropRect.y + cropRect.h) < threshold) cropRect.y = canvas.height - cropRect.h;
  }

  document.addEventListener('mouseup', () => {
    if (isDragging || isResizing) snapToEdges();
    updateOverlay();
    isDragging = false;
    isResizing = false;
    resizeHandle = null;
  });

  // ─── Touch Support ────────────────────────
  cropOverlay.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      const touch = e.touches[0];
      const { x, y } = getCanvasCoords(touch.clientX, touch.clientY);
      const { x: cx, y: cy, w: cw, h: ch } = cropRect;

      const tRect = cropOverlay.getBoundingClientRect();
      const tHandleScale = canvas.width / tRect.width;
      const handleSize = 28 * tHandleScale;
      const handleInset = 24 * tHandleScale;
      if (Math.abs(x - (cx + handleInset)) < handleSize && Math.abs(y - (cy + handleInset)) < handleSize) {
        isResizing = true; resizeHandle = 'nw';
      } else if (Math.abs(x - (cx + cw - handleInset)) < handleSize && Math.abs(y - (cy + handleInset)) < handleSize) {
        isResizing = true; resizeHandle = 'ne';
      } else if (Math.abs(x - (cx + handleInset)) < handleSize && Math.abs(y - (cy + ch - handleInset)) < handleSize) {
        isResizing = true; resizeHandle = 'sw';
      } else if (Math.abs(x - (cx + cw - handleInset)) < handleSize && Math.abs(y - (cy + ch - handleInset)) < handleSize) {
        isResizing = true; resizeHandle = 'se';
      } else if (x >= cx && x <= cx + cw && y >= cy && y <= cy + ch) {
        isDragging = true;
      }

      dragStart = { x, y };
      cropStart = { ...cropRect };
    }
    e.preventDefault();
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging && !isResizing) return;
    if (e.touches.length !== 1) return;

    const touch = e.touches[0];
    const { x, y } = getCanvasCoords(touch.clientX, touch.clientY);
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;

    if (isDragging) {
      cropRect.x = Math.max(0, Math.min(cropStart.x + dx, canvas.width - cropRect.w));
      cropRect.y = Math.max(0, Math.min(cropStart.y + dy, canvas.height - cropRect.h));
    } else if (isResizing) {
      const minSize = Math.max(10, Math.min(canvas.width, canvas.height) * 0.02);
      let newX = cropStart.x, newY = cropStart.y, newW = cropStart.w, newH = cropStart.h;

      switch (resizeHandle) {
        case 'se':
          newW = Math.max(minSize, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h + dy) : newW / currentRatio;
          break;
        case 'nw':
          newW = Math.max(minSize, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h - dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'ne':
          newW = Math.max(minSize, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h - dy) : newW / currentRatio;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'sw':
          newW = Math.max(minSize, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(minSize, cropStart.h + dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          break;
      }

      if (newX < 0) { newW += newX; newX = 0; }
      if (newY < 0) { newH += newY; newY = 0; }
      if (newX + newW > canvas.width) newW = canvas.width - newX;
      if (newY + newH > canvas.height) newH = canvas.height - newY;

      cropRect = { x: newX, y: newY, w: Math.max(minSize, newW), h: Math.max(minSize, newH) };
    }

    updateOverlay();
    e.preventDefault();
  });

  document.addEventListener('touchend', () => {
    if (isDragging || isResizing) snapToEdges();
    updateOverlay();
    isDragging = false;
    isResizing = false;
    resizeHandle = null;
  });

})();
</script>
