  :root {

    --ink-secondary: #424245;

  .btn-outline {

    white-space: nowrap;

  /* ===== Settings Bar ===== */

    display: flex;
    flex-wrap: nowrap;

    padding: 2px;

  /* ===== Actions Row ===== */
  .actions-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;

  /* ===== Canvas ===== */
  .canvas-wrapper {
    position: relative;
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    border-radius: var(--radius-md);
    background: #000;

  #canvas {
    display: block;
    max-width: 100%;
  }
  .crop-overlay {
    position: absolute;
    top: 0;
    left: 0;
    cursor: move;
  }
  .crop-frame {
    fill: none;
    stroke: var(--link);
    stroke-width: 2;
  }
  .crop-mask {
    fill: rgba(0, 0, 0, 0.5);
  }
  .crop-handle {
    fill: var(--link);

    stroke-width: 2;
    cursor: pointer;

  .crop-handle.nw { cursor: nw-resize; }
  .crop-handle.ne { cursor: ne-resize; }
  .crop-handle.sw { cursor: sw-resize; }
  .crop-handle.se { cursor: se-resize; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: var(--fill-black);
    color: var(--fill-white);
    border-radius: var(--radius-lg);
    padding: 16px 28px;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: -0.01em;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* ===== Responsive ===== */
  @media (max-width: 1068px) {

    .page-hero { padding: 36px 16px 24px; }
    .page-hero h1 { font-size: 32px; }
    .page-hero p { font-size: 17px; }
    .section { padding: 24px 0 48px; }
    .section-inner { padding: 0 16px; }
    .settings-bar { padding: 16px; gap: 14px; }
    .setting-group { min-width: 100%; }
    .dropzone { padding: 36px 16px; }
    .drop-icon { font-size: 36px; }
    .drop-title { font-size: 17px; }
    .drop-desc { font-size: 12px; }
    .actions-row { gap: 8px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-val { font-size: 22px; }
    .crop-info-bar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px 14px; }
  }

  @media (max-width: 480px) {
    .nav-links { display: none; }
    .btn-filled, .btn-outline { font-size: 14px; padding: 7px 16px; }
    .btn-sm { font-size: 12px; padding: 5px 10px; }
    .segment-btn { padding: 5px 0; font-size: 11px; }
  }

      <!-- Settings Bar -->

        <div class="setting-group">

        </div>
        <div class="setting-group">
          <div style="display:flex;gap:8px;">
            <select id="exportFormat" style="padding:6px 10px;border:1px solid var(--border-color, #e0e0e0);border-radius:8px;font-size:13px;background:var(--bg-primary,#fff);cursor:pointer;">

        <div class="crop-info-item">
          <span>宽高比：</span>
          <span class="val" id="statRatio">--</span>

          <span>文件大小：</span>

<script>
/* ============================================
   WLi Tools - 在线工具集
   © 2025 WLi. All rights reserved.
   Developer: WLi
   ============================================ */
(function() {
  // ─── Global State ─────────────────────────
  let originalImage = null;
  let currentFile = null;
  let canvas = document.getElementById('canvas');
  let ctx = canvas.getContext('2d');
  let cropOverlay = document.getElementById('cropOverlay');
  let cropRect = { x: 0, y: 0, w: 0, h: 0 };
  let currentRatio = 'free';
  let isDragging = false;
  let isResizing = false;
  let resizeHandle = null;
  let dragStart = { x: 0, y: 0 };
  let cropStart = { x: 0, y: 0, w: 0, h: 0 };
  let rotation = 0;
  let flipH = false;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const toastEl = document.getElementById('toast');

  // ─── Restore from sessionStorage on page load ─────────────────────────
  (function restoreSession() {
    const savedImage = sessionStorage.getItem('cropper_image');
    if (savedImage) {
      rotation = parseInt(sessionStorage.getItem('cropper_rotation') || '0');
      flipH = sessionStorage.getItem('cropper_flipH') === 'true';
      currentFile = { name: sessionStorage.getItem('cropper_filename') || 'image.png' };
      originalImage = new Image();
      originalImage.onload = () => {
        initEditor();
      };
      originalImage.src = savedImage;
    }
  })();

  // ─── Helpers ─────────────────────────────
  function formatBytes(bytes) {
    if (!bytes && bytes !== 0) return '--';
    if (bytes === 0) return '0 B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    if (kb >= 1) return kb.toFixed(1) + ' KB';
    return bytes + ' B';
  }

  function gcd(a, b) {
    a = Math.abs(Math.round(a));
    b = Math.abs(Math.round(b));
    while (b) { [a, b] = [b, a % b]; }
    return a;
  }

  function computeAspectRatio(w, h) {
    if (w <= 0 || h <= 0) return '--';
    const g = gcd(w, h);
    const rw = w / g;
    const rh = h / g;
    // If the simplified ratio is too large, show decimal
    if (rw > 50 || rh > 50) {
      return (w / h).toFixed(2) + ':1';
    }
    return rw + ':' + rh;
  }

  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ─── Upload Events ───────────────────────
  let touchStartY = 0;
  let touchHandled = false;

  dropzone.addEventListener('click', (e) => {
    if (touchHandled) { touchHandled = false; return; }
    fileInput.click();
  });
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
  });
  dropzone.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; dropzone.style.transform = 'scale(0.98)'; }, { passive: true });
  dropzone.addEventListener('touchend', (e) => {
    dropzone.style.transform = '';
    if (Math.abs(e.changedTouches[0].clientY - touchStartY) < 10) { touchHandled = true; fileInput.click(); }
  }, { passive: true });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (file.type === 'application/pdf') {
      // PDF: 用 pdf.js 渲染第一页为图片
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);
        pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
          pdf.getPage(1).then(function(page) {
            const scale = 2;
            const viewport = page.getViewport({ scale: scale });
            const pdfCanvas = document.createElement('canvas');
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            const pdfCtx = pdfCanvas.getContext('2d');
            page.render({ canvasContext: pdfCtx, viewport: viewport }).promise.then(function() {
              const dataURL = pdfCanvas.toDataURL('image/png');
              currentFile = { name: file.name.replace(/\.pdf$/i, '.png') };
              sessionStorage.setItem('cropper_image', dataURL);
              sessionStorage.setItem('cropper_filename', currentFile.name);
              originalImage = new Image();
              originalImage.onload = function() { initEditor(); };
              originalImage.src = dataURL;
            });
          });
        }).catch(function(err) {
          showToast('PDF 解析失败：' + err.message);
        });
      };
      reader.readAsArrayBuffer(file);
      return;
    }
    if (!file.type.startsWith('image/')) {
      showToast('不支持的文件格式');
      return;
    }
    currentFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      sessionStorage.setItem('cropper_image', e.target.result);
      sessionStorage.setItem('cropper_filename', file.name);
      originalImage = new Image();
      originalImage.onload = () => {
        initEditor();
      };
      originalImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function initEditor() {
    dropzone.classList.add('hidden');
    document.getElementById('editorArea').classList.add('active');

    // Update image info stats
    updateImageStats();
    renderCanvas();

    // Persist state
    sessionStorage.setItem('cropper_rotation', rotation);
    sessionStorage.setItem('cropper_flipH', flipH);
  }

  function updateImageStats() {
    if (!originalImage || !currentFile) return;
    let w = originalImage.width;
    let h = originalImage.height;
    if (rotation % 180 !== 0) { [w, h] = [h, w]; }

    document.getElementById('statResolution').textContent = w + ' \u00d7 ' + h;
    document.getElementById('statRatio').textContent = computeAspectRatio(w, h);
    document.getElementById('statFileSize').textContent = formatBytes(currentFile.size);

    // Truncate filename if too long
    let name = currentFile.name;
    if (name.length > 20) {
      const ext = name.lastIndexOf('.');
      if (ext > 0) {
        name = name.substring(0, 17) + '...' + name.substring(ext);
      } else {
        name = name.substring(0, 20) + '...';
      }
    }
    document.getElementById('statFileName').textContent = name;
    document.getElementById('statFileName').title = currentFile.name;
  }

  function renderCanvas() {
    if (!originalImage) return;
    const maxWidth = Math.min(900, window.innerWidth - 80);
    const maxHeight = 600;

    let imgWidth = originalImage.width;
    let imgHeight = originalImage.height;

    // Account for rotation
    if (rotation % 180 !== 0) {
      [imgWidth, imgHeight] = [imgHeight, imgWidth];
    }

    const scale = Math.min(maxWidth / imgWidth, maxHeight / imgHeight, 1);
    canvas.width = imgWidth * scale;
    canvas.height = imgHeight * scale;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rotation * Math.PI / 180);
    if (flipH) {
      ctx.scale(-1, 1);
    }
    ctx.drawImage(originalImage, -originalImage.width * scale / 2, -originalImage.height * scale / 2, originalImage.width * scale, originalImage.height * scale);
    ctx.restore();

    // Update overlay size
    cropOverlay.style.width = canvas.width + 'px';
    cropOverlay.style.height = canvas.height + 'px';
    cropOverlay.setAttribute('viewBox', '0 0 ' + canvas.width + ' ' + canvas.height);

    // Initialize crop rect
    initCropRect();
    updateOverlay();
  }

  function initCropRect() {
    const padding = 40;
    const maxW = canvas.width - padding * 2;
    const maxH = canvas.height - padding * 2;

    if (currentRatio === 'free') {
      cropRect = { x: padding, y: padding, w: maxW, h: maxH };
    } else {
      const ratio = currentRatio;
      let w, h;
      if (maxW / maxH > ratio) {
        h = maxH;
        w = h * ratio;
      } else {
        w = maxW;
        h = w / ratio;
      }
      cropRect = {
        x: (canvas.width - w) / 2,
        y: (canvas.height - h) / 2,
        w: w,
        h: h
      };
    }
    updateDimensionInputs();
  }

  function updateOverlay() {
    const { x, y, w, h } = cropRect;
    const cw = canvas.width;
    const ch = canvas.height;

    // Mask path
    const maskPath = 'M0,0 L' + cw + ',0 L' + cw + ',' + ch + ' L0,' + ch + ' Z M' + x + ',' + y + ' L' + x + ',' + (y + h) + ' L' + (x + w) + ',' + (y + h) + ' L' + (x + w) + ',' + y + ' Z';
    document.getElementById('cropMask').setAttribute('d', maskPath);

    // Crop frame
    document.getElementById('cropFrame').setAttribute('x', x);
    document.getElementById('cropFrame').setAttribute('y', y);
    document.getElementById('cropFrame').setAttribute('width', w);
    document.getElementById('cropFrame').setAttribute('height', h);

    // Handles
    const handleSize = 12;
    document.getElementById('handleNW').setAttribute('x', x - handleSize / 2);
    document.getElementById('handleNW').setAttribute('y', y - handleSize / 2);
    document.getElementById('handleNE').setAttribute('x', x + w - handleSize / 2);
    document.getElementById('handleNE').setAttribute('y', y - handleSize / 2);
    document.getElementById('handleSW').setAttribute('x', x - handleSize / 2);
    document.getElementById('handleSW').setAttribute('y', y + h - handleSize / 2);
    document.getElementById('handleSE').setAttribute('x', x + w - handleSize / 2);
    document.getElementById('handleSE').setAttribute('y', y + h - handleSize / 2);

    // Update crop info bar
    const scale = canvas.width / (rotation % 180 === 0 ? originalImage.width : originalImage.height);
    const realW = Math.round(w / scale);
    const realH = Math.round(h / scale);
    document.getElementById('cropSizeInfo').innerHTML = realW + ' &times; ' + realH + ' px';
    document.getElementById('cropRatioInfo').textContent = computeAspectRatio(realW, realH);
  }

  // ─── Ratio Selection ─────────────────────
  document.querySelectorAll('#ratioGroup .segment-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#ratioGroup .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.ratio;
      if (val === 'free') {
        currentRatio = 'free';
      } else {
        const parts = val.split(':');
        currentRatio = parseInt(parts[0]) / parseInt(parts[1]);
      }
      initCropRect();
      updateOverlay();
    });
  });

  function setRatio(ratio) {
    currentRatio = ratio;
    document.querySelectorAll('#ratioGroup .segment-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.ratio === (ratio === 'free' ? 'free' : ratio.toString())) {
        btn.classList.add('active');
      }
    });
    initCropRect();
    updateOverlay();
  }

  function updateDimensionInputs() {
    const scale = canvas.width / (rotation % 180 === 0 ? originalImage.width : originalImage.height);
    document.getElementById('cropWidth').value = Math.round(cropRect.w / scale);
    document.getElementById('cropHeight').value = Math.round(cropRect.h / scale);
  }

  document.getElementById('cropWidth').addEventListener('change', updateCropFromInput);
  document.getElementById('cropHeight').addEventListener('change', updateCropFromInput);

  function updateCropFromInput() {
    if (!originalImage) return;
    const scale = canvas.width / (rotation % 180 === 0 ? originalImage.width : originalImage.height);
    const w = parseInt(document.getElementById('cropWidth').value) || 100;
    const h = parseInt(document.getElementById('cropHeight').value) || 100;
    cropRect.w = w * scale;
    cropRect.h = h * scale;
    cropRect.x = Math.max(0, Math.min(cropRect.x, canvas.width - cropRect.w));
    cropRect.y = Math.max(0, Math.min(cropRect.y, canvas.height - cropRect.h));
    updateOverlay();
  }

  // ─── Rotate & Reset ──────────────────────
  window.rotateImage = function(deg) {
    rotation = (rotation + deg) % 360;
    sessionStorage.setItem('cropper_rotation', rotation);
    updateImageStats();
    renderCanvas();
  };

  window.flipImage = function() {
    flipH = !flipH;
    sessionStorage.setItem('cropper_flipH', flipH);
    renderCanvas();
  };

  window.resetCrop = function() {
    rotation = 0;
    flipH = false;
    currentRatio = 'free';
    document.querySelectorAll('#ratioGroup .segment-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.ratio === 'free');
    });
    updateImageStats();
    renderCanvas();
    showToast('已重置裁切');
  };

  window.changeImage = function() {
    sessionStorage.removeItem('cropper_image');
    sessionStorage.removeItem('cropper_filename');
    sessionStorage.removeItem('cropper_rotation');
    sessionStorage.removeItem('cropper_flipH');
    fileInput.click();
  };

  // ─── Download ─────────────────────────────
  window.downloadCrop = function() {
    if (!originalImage) return;
    const scale = canvas.width / (rotation % 180 === 0 ? originalImage.width : originalImage.height);
    const sx = cropRect.x / scale;
    const sy = cropRect.y / scale;
    const sw = cropRect.w / scale;
    const sh = cropRect.h / scale;

    const resultCanvas = document.createElement('canvas');
    resultCanvas.width = Math.round(sw);
    resultCanvas.height = Math.round(sh);
    const rctx = resultCanvas.getContext('2d');

    rctx.save();
    rctx.translate(resultCanvas.width / 2, resultCanvas.height / 2);
    rctx.rotate(-rotation * Math.PI / 180);
    if (flipH) {
      rctx.scale(-1, 1);
    }
    rctx.drawImage(originalImage, -sx - sw / 2, -sy - sh / 2);
    rctx.restore();

    const link = document.createElement('a');
    const baseName = currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'image';
    const fmt = document.getElementById('exportFormat').value;
    const mimeType = fmt === 'jpeg' ? 'image/jpeg' : fmt === 'webp' ? 'image/webp' : 'image/png';
    const ext = fmt === 'jpeg' ? 'jpg' : fmt;
    const quality = fmt === 'jpeg' ? 0.92 : undefined;
    link.download = baseName + '_cropped.' + ext;
    link.href = resultCanvas.toDataURL(mimeType, quality);
    link.click();
    showToast('裁切图片已下载（' + ext.toUpperCase() + '）');
  };

  // ─── Mouse Interaction ───────────────────
  cropOverlay.addEventListener('mousedown', (e) => {
    const rect = cropOverlay.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const { x: cx, y: cy, w: cw, h: ch } = cropRect;

    const handleSize = 20;
    if (Math.abs(x - cx) < handleSize && Math.abs(y - cy) < handleSize) {
      isResizing = true; resizeHandle = 'nw';
    } else if (Math.abs(x - (cx + cw)) < handleSize && Math.abs(y - cy) < handleSize) {
      isResizing = true; resizeHandle = 'ne';
    } else if (Math.abs(x - cx) < handleSize && Math.abs(y - (cy + ch)) < handleSize) {
      isResizing = true; resizeHandle = 'sw';
    } else if (Math.abs(x - (cx + cw)) < handleSize && Math.abs(y - (cy + ch)) < handleSize) {
      isResizing = true; resizeHandle = 'se';
    } else if (x >= cx && x <= cx + cw && y >= cy && y <= cy + ch) {
      isDragging = true;
    }

    dragStart = { x, y };
    cropStart = { ...cropRect };
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging && !isResizing) return;

    const rect = cropOverlay.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;

    if (isDragging) {
      cropRect.x = Math.max(0, Math.min(cropStart.x + dx, canvas.width - cropRect.w));
      cropRect.y = Math.max(0, Math.min(cropStart.y + dy, canvas.height - cropRect.h));
    } else if (isResizing) {
      let newX = cropStart.x, newY = cropStart.y, newW = cropStart.w, newH = cropStart.h;

      switch (resizeHandle) {
        case 'se':
          newW = Math.max(50, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h + dy) : newW / currentRatio;
          break;
        case 'nw':
          newW = Math.max(50, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h - dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'ne':
          newW = Math.max(50, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h - dy) : newW / currentRatio;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'sw':
          newW = Math.max(50, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h + dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          break;
      }

      if (newX < 0) { newW += newX; newX = 0; }
      if (newY < 0) { newH += newY; newY = 0; }
      if (newX + newW > canvas.width) newW = canvas.width - newX;
      if (newY + newH > canvas.height) newH = canvas.height - newY;

      cropRect = { x: newX, y: newY, w: Math.max(50, newW), h: Math.max(50, newH) };
    }

    updateOverlay();
    updateDimensionInputs();
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    isResizing = false;
    resizeHandle = null;
  });

  // ─── Touch Support ────────────────────────
  cropOverlay.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      const touch = e.touches[0];
      const rect = cropOverlay.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      const { x: cx, y: cy, w: cw, h: ch } = cropRect;

      const handleSize = 20;
      if (Math.abs(x - cx) < handleSize && Math.abs(y - cy) < handleSize) {
        isResizing = true; resizeHandle = 'nw';
      } else if (Math.abs(x - (cx + cw)) < handleSize && Math.abs(y - cy) < handleSize) {
        isResizing = true; resizeHandle = 'ne';
      } else if (Math.abs(x - cx) < handleSize && Math.abs(y - (cy + ch)) < handleSize) {
        isResizing = true; resizeHandle = 'sw';
      } else if (Math.abs(x - (cx + cw)) < handleSize && Math.abs(y - (cy + ch)) < handleSize) {
        isResizing = true; resizeHandle = 'se';
      } else if (x >= cx && x <= cx + cw && y >= cy && y <= cy + ch) {
        isDragging = true;
      }

      dragStart = { x, y };
      cropStart = { ...cropRect };
    }
    e.preventDefault();
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging && !isResizing) return;
    if (e.touches.length !== 1) return;

    const touch = e.touches[0];
    const rect = cropOverlay.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;

    if (isDragging) {
      cropRect.x = Math.max(0, Math.min(cropStart.x + dx, canvas.width - cropRect.w));
      cropRect.y = Math.max(0, Math.min(cropStart.y + dy, canvas.height - cropRect.h));
    } else if (isResizing) {
      let newX = cropStart.x, newY = cropStart.y, newW = cropStart.w, newH = cropStart.h;

      switch (resizeHandle) {
        case 'se':
          newW = Math.max(50, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h + dy) : newW / currentRatio;
          break;
        case 'nw':
          newW = Math.max(50, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h - dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'ne':
          newW = Math.max(50, cropStart.w + dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h - dy) : newW / currentRatio;
          newY = cropStart.y + cropStart.h - newH;
          break;
        case 'sw':
          newW = Math.max(50, cropStart.w - dx);
          newH = currentRatio === 'free' ? Math.max(50, cropStart.h + dy) : newW / currentRatio;
          newX = cropStart.x + cropStart.w - newW;
          break;
      }

      if (newX < 0) { newW += newX; newX = 0; }
      if (newY < 0) { newH += newY; newY = 0; }
      if (newX + newW > canvas.width) newW = canvas.width - newX;
      if (newY + newH > canvas.height) newH = canvas.height - newY;

      cropRect = { x: newX, y: newY, w: Math.max(50, newW), h: Math.max(50, newH) };
    }

    updateOverlay();
    updateDimensionInputs();
    e.preventDefault();
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
    isResizing = false;
    resizeHandle = null;
  });

})();
</script>
