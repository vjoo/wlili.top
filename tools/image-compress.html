<!-- Page Hero -->
<div class="page-hero">

<section class="section">

        <div class="stat-val" id="statCompressed">0 MB</div>

      </div>

        <div class="stat-val green" id="statSaved">0%</div>
        <div class="stat-label">节省空间</div>
      </div>
    </div>

    <!-- Image List -->
    <div class="image-list" id="imageList"></div>

  </div>
</section>

<div class="toast" id="toast"></div>

<script>

(function() {
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const imageList  = document.getElementById('imageList');
  const qualityInp = document.getElementById('quality');
  const qualityVal = document.getElementById('qualityVal');
  const maxSizeInp = document.getElementById('maxSize');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  const toastEl    = document.getElementById('toast');

  const btnDownloadAll = document.getElementById('btnDownloadAll');
  const btnClear    = document.getElementById('btnClear');

  let images = [];
  let idCounter = 0;
  let selectedFormat = 'image/jpeg';

  // ─── Helpers ─────────────────────────────
  function formatBytes(bytes) {
    if (!bytes && bytes !== 0) return '—';
    if (bytes === 0) return '0 B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    if (kb >= 1) return kb.toFixed(1) + ' KB';
    return bytes + ' B';
  }
  function formatBytesCompact(bytes) {
    if (!bytes && bytes !== 0) return '—';
    if (bytes === 0) return '0B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    return kb.toFixed(1) + ' KB';
  }
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }
  function getExt(fmt) {
    return { 'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/avif':'avif','image/svg+xml':'svg' }[fmt] || 'jpg';
  }

  // ─── Settings ─────────────────────────────
  qualityInp.addEventListener('input', () => { qualityVal.textContent = qualityInp.value; });
  document.querySelectorAll('#formatGroup .segment-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#formatGroup .segment-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      selectedFormat = b.dataset.fmt;
    });
  });

  // ─── AVIF support check ──────────────────
  (function() {
    const c = document.createElement('canvas'); c.width = 1; c.height = 1;
    c.toBlob(blob => {
      if (!blob || blob.type !== 'image/avif') {
        const btn = document.querySelector('[data-fmt="image/avif"]');
        if (btn) { btn.style.opacity = '0.4'; btn.title = '当前浏览器不支持 AVIF'; btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); showToast('当前浏览器不支持 AVIF'); }); }
      }
    }, 'image/avif');
  })();

  // ─── Touch & Drag Upload ─────────────────
  let touchStartY = 0;
  let touchHandled = false;

  dropzone.addEventListener('click', (e) => {
    if (touchHandled) { touchHandled = false; return; }
    fileInput.click();
  });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
  dropzone.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; dropzone.style.transform = 'scale(0.98)'; }, { passive: true });
  dropzone.addEventListener('touchend', (e) => {
    dropzone.style.transform = '';
    if (Math.abs(e.changedTouches[0].clientY - touchStartY) < 10) { touchHandled = true; fileInput.click(); }
  }, { passive: true });
  fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

  function handleFiles(files) {
    const validTypes = ['image/jpeg','image/png','image/webp','image/avif','image/svg+xml','image/bmp','image/tiff','image/gif'];
    let added = 0;
    for (const f of files) {
      if (!validTypes.includes(f.type) && !f.name.match(/\.(jpg|jpeg|png|webp|avif|svg|bmp|tiff|tif|gif)$/i)) continue;
      images.push({ id: ++idCounter, file: f, compressedBlob: null, compressedSize: null, status: 'pending' });
      added++;
    }
    if (added > 0) { showToast(`已添加 ${added} 张图片`); renderList(); }
    else { showToast('未识别到有效图片文件'); }
  }

  function removeImage(id) {
    const im = images.find(i => i.id === id);
    if (im && im._thumbUrl) URL.revokeObjectURL(im._thumbUrl);
    images = images.filter(im => im.id !== id);
    renderList();
  }
  function findCardById(id) { return document.querySelector(`[data-id="${id}"]`); }

  // ─── Compression ─────────────────────────
  async function compressImage(imgObj) {
    const quality = parseInt(qualityInp.value) / 100;
    const maxDim = parseInt(maxSizeInp.value) || 0;
    const outFmt = selectedFormat;
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(imgObj.file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.naturalWidth, h = img.naturalHeight;
        if (maxDim > 0 && (w > maxDim || h > maxDim)) { const r = Math.min(maxDim / w, maxDim / h); w = Math.round(w * r); h = Math.round(h * r); }
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d'); ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high'; ctx.drawImage(img, 0, 0, w, h);
        cv.toBlob(blob => { blob ? resolve({ blob, size: blob.size }) : reject(new Error('toBlob 返回空')); }, outFmt, (outFmt === 'image/png' || outFmt === 'image/svg+xml') ? undefined : quality);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('图片加载失败')); };
      img.src = url;
    });
  }

  async function compressAll() {
    const pending = images.filter(im => im.status === 'pending');
    if (!pending.length) { showToast('没有需要压缩的图片'); return; }
    btnCompressAll.disabled = true;
    progressWrap.classList.add('visible');
    let done = 0; const total = pending.length;
    for (const imgObj of pending) {
      imgObj.status = 'processing'; renderCard(imgObj);
      try { const r = await compressImage(imgObj); imgObj.compressedBlob = r.blob; imgObj.compressedSize = r.size; imgObj.status = 'done'; }
      catch (err) { imgObj.status = 'error'; imgObj.compressError = err.message; }
      done++; progressFill.style.width = ((done / total) * 100) + '%'; progressText.textContent = `压缩进度：${done} / ${total}`;
      renderCard(imgObj); updateStats(); enableButtons();
    }
    setTimeout(() => { progressWrap.classList.remove('visible'); progressFill.style.width = '0%'; }, 1200);
    btnCompressAll.disabled = false; enableButtons(); updateStats();
    showToast(`压缩完成！共处理 ${total} 张图片`);
  }

  // ─── Render ──────────────────────────────
  function renderList() {
    images.forEach(im => { if (im._thumbUrl) { URL.revokeObjectURL(im._thumbUrl); im._thumbUrl = null; } });
    if (!images.length) { imageList.innerHTML = ''; statsRow.style.display = 'none'; enableButtons(); return; }
    imageList.innerHTML = images.map(im => cardHTML(im)).join('');
    updateStats(); enableButtons();
  }
  function renderCard(im) { const c = findCardById(im.id); if (c) c.outerHTML = cardHTML(im); }

  function cardHTML(im) {
    if (im._thumbUrl) URL.revokeObjectURL(im._thumbUrl);
    im._thumbUrl = URL.createObjectURL(im.file);
    const origSize = im.file.size, compSize = im.compressedSize;
    const done = im.status === 'done', processing = im.status === 'processing', error = im.status === 'error';
    let sizeHTML = '';
    if (done) {
      const pct = ((1 - compSize / origSize) * 100).toFixed(1), bigger = compSize >= origSize;
      sizeHTML = `<span class="card-size original">${formatBytesCompact(origSize)}</span><span class="card-size arrow">→</span><span class="card-size compressed">${formatBytesCompact(compSize)}</span><span style="font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap">${bigger?'+'+(pct*-1):+pct}%</span>`;
    } else if (processing) { sizeHTML = `<span style="color:var(--link);font-size:12px">压缩中…</span>`; }
    else if (error) { sizeHTML = `<span style="color:var(--red);font-size:12px">失败</span>`; }
    else { sizeHTML = `<span class="card-size original">${formatBytesCompact(origSize)}</span>`; }
    const cls = done ? 'done' : (processing ? 'processing' : '');
    const dlBtn = done ? `<button class="card-btn" onclick="event.stopPropagation();downloadSingle(${im.id})" title="下载"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>` : '';
    return `<div class="image-card ${cls}" data-id="${im.id}"><img class="card-thumb" src="${im._thumbUrl}" alt="" loading="lazy"><div class="card-info"><div class="card-name" title="${im.file.name}">${im.file.name}</div><div class="card-meta"><span>${im.file.type.replace('image/','').toUpperCase()}</span>${done?`<span class="reduced">→ ${getExt(selectedFormat).toUpperCase()}</span>`:''}</div></div><div class="card-size-group">${sizeHTML}</div><div class="card-actions">${dlBtn}<button class="card-btn danger" onclick="event.stopPropagation();removeImage(${im.id})" title="移除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>`;
  }

  function updateStats() {
    const total = images.length, original = images.reduce((s, im) => s + im.file.size, 0);
    const doneList = images.filter(im => im.status === 'done'), compressed = doneList.reduce((s, im) => s + (im.compressedSize || 0), 0);
    const pct = original > 0 ? ((1 - compressed / original) * 100).toFixed(1) : '0', saved = compressed > 0 ? pct : '—';
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statOriginal').textContent = formatBytes(original);
    document.getElementById('statCompressed').textContent = formatBytes(compressed || 0);
    document.getElementById('statSaved').textContent = saved === '—' ? '—' : saved + '%';
    document.getElementById('statSaved').style.color = parseFloat(saved) > 0 ? 'var(--green)' : (parseFloat(saved) < 0 ? 'var(--red)' : 'var(--ink)');
    statsRow.style.display = total > 0 ? 'grid' : 'none';
  }

  function enableButtons() {
    const total = images.length, pending = images.filter(im => im.status === 'pending').length, done = images.filter(im => im.status === 'done').length;
    btnCompressAll.disabled = pending === 0; btnDownloadAll.disabled = done === 0; btnClear.disabled = total === 0;
  }

  // ─── Download ────────────────────────────
  function downloadSingle(id) {
    const im = images.find(i => i.id === id); if (!im || !im.compressedBlob) return;
    const ext = getExt(selectedFormat), name = im.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
    const url = URL.createObjectURL(im.compressedBlob); const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  async function downloadAll() {
    const doneList = images.filter(im => im.status === 'done' && im.compressedBlob); if (!doneList.length) return;
    const ext = getExt(selectedFormat), zip = new JSZip();
    showToast('正在打包 ZIP...');
    for (const im of doneList) zip.file(im.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext, im.compressedBlob);
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob); const a = document.createElement('a'); a.href = url; a.download = 'compressed_images.zip'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000); showToast('ZIP 下载已开始！');
  }
  function clearAll() {
    images.forEach(im => { if (im._thumbUrl) URL.revokeObjectURL(im._thumbUrl); });
    images = []; imageList.innerHTML = ''; statsRow.style.display = 'none'; enableButtons(); showToast('列表已清空');
  }

  btnCompressAll.addEventListener('click', compressAll);
  btnDownloadAll.addEventListener('click', downloadAll);
  btnClear.addEventListener('click', clearAll);
  window.removeImage = removeImage;
  window.downloadSingle = downloadSingle;
})();
</script>
