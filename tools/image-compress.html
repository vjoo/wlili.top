<style>
/* ============================================
   WLi Tools - 在线工具集
   © 2025 WLi. All rights reserved.
   Developer: WLi
   ============================================ */
  /* ===== Settings Bar ===== */
  .settings-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: flex-start;
    background: var(--bg);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-width: 140px;
  }
  .setting-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink-tertiary);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .setting-label .val {
    color: var(--link);
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 12px;
    margin-left: 4px;
  }

  /* Segmented Control */
  .segmented-control {
    display: flex;
    flex-wrap: nowrap;
    background: var(--bg-white);
    border-radius: var(--radius-pill);
    padding: 2px;
    gap: 2px;
    border: 1px solid var(--border-light);
    height: 36px;
    width: 100%;
    overflow: hidden;
  }
  .segment-btn {
    padding: 6px 0;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    touch-action: manipulation;
    font-family: inherit;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1 1 0;
    min-width: 0;
  }
  .segment-btn.active {
    background: var(--fill-black);
    color: var(--fill-white);
  }
  .segment-btn:not(.active):hover { background: rgba(0,0,0,0.04); }
  .segment-btn:active { transform: scale(0.97); }

  /* Range Input */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 36px;
    background: transparent;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    -webkit-appearance: none;
    height: 34px;
    background: var(--fill-white);
    border-radius: 17px;
    border: 1px solid var(--border-light);
    box-sizing: border-box;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 33px; height: 33px;
    background: var(--fill-black);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    margin-top: 0px;
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }

  /* ===== Progress ===== */
  .progress-wrap { margin-bottom: 20px; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-bar-bg {
    height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--link);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 12px;
    color: var(--ink-quaternary);
    font-family: 'SF Mono', monospace;
  }

  /* ===== Stats (page-specific) ===== */
  .stat-val.green { color: var(--green); }

  /* ===== Image List ===== */
  .image-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .image-card {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    gap: 14px;
    align-items: center;
    background: var(--bg-white);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    transition: all 0.2s;
  }
  .image-card:hover { border-color: var(--border); }
  .image-card.done { border-left: 3px solid var(--green); }
  .image-card.processing { border-left: 3px solid var(--link); opacity: 0.7; }
  .card-thumb {
    width: 48px; height: 48px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    background: var(--bg);
  }
  .card-info { min-width: 0; }
  .card-name {
    font-size: 14px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .card-meta {
    font-size: 12px;
    color: var(--ink-quaternary);
    font-family: 'SF Mono', monospace;
    display: flex;
    gap: 8px;
  }
  .card-meta .reduced { color: var(--green); }
  .card-size-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'SF Mono', monospace;
    font-size: 14px;
  }
  .card-size.original { color: var(--ink-secondary); }
  .card-size.compressed { color: var(--ink); font-weight: 600; }
  .card-size.arrow { color: var(--ink-quaternary); }
  .card-actions { display: flex; gap: 8px; }
  .card-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border-light);
    background: var(--bg-white);
    color: var(--ink-tertiary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .card-btn:active { transform: scale(0.9); }
  .card-btn:hover { border-color: var(--link); color: var(--link); background: rgba(0,102,204,0.04); }
  .card-btn.danger:hover { border-color: var(--ink); color: var(--ink); background: rgba(0,0,0,0.04); }

  /* ===== Responsive ===== */
  @media (max-width: 734px) {
    .settings-bar { padding: 16px; gap: 14px; }
    .setting-group { min-width: 100%; }
    .image-card {
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      padding: 10px 12px;
    }
    .card-thumb { width: 40px; height: 40px; }
    .card-name { font-size: 13px; }
    .card-size-group { display: none; }
    .card-actions { grid-column: 3; }
  }
</style>

<body>

<!-- Page Hero -->
<div class="page-hero">
  <h1>图片压缩</h1>
  <p>批量上传图片，智能压缩至更小体积，支持多格式导出</p>
</div>

<!-- Main Section -->
<section class="section">
  <div class="section-inner">

    <!-- Settings -->
    <div class="settings-bar">
      <div class="setting-group">
        <label class="setting-label">压缩品质 <span class="val" id="qualityVal">90</span></label>
        <input type="range" id="quality" min="10" max="100" value="90" step="1">
      </div>
      <div class="setting-group">
        <label class="setting-label">输出格式</label>
        <div class="segmented-control" id="formatGroup">
          <button class="segment-btn active" data-fmt="image/jpeg">JPG</button>
          <button class="segment-btn" data-fmt="image/png">PNG</button>
          <button class="segment-btn" data-fmt="image/webp">WebP</button>
          <button class="segment-btn" data-fmt="image/avif">AVIF</button>
          <button class="segment-btn" data-fmt="image/svg+xml">SVG</button>
          <button class="segment-btn" data-fmt="application/pdf">PDF</button>
          <button class="segment-btn" data-fmt="image/gif">GIF</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">最长边</label>
        <input type="number" class="text-input" id="maxSize" value="0" min="0" max="10000" placeholder="例如 1920">
      </div>
    </div>

    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <div class="drop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
      <div class="drop-title">拖拽图片到此处，或 <span class="drop-link">点击选择</span></div>
      <div class="drop-desc">支持 JPG / PNG / WebP / AVIF / SVG / GIF / APNG / PDF / BMP / TIFF，可批量上传</div>
      <input type="file" id="fileInput" accept="image/*,.pdf" multiple>
    </div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="btn-filled btn-sm" id="btnCompressAll" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> 一键压缩全部</button>
      <button class="btn-outline btn-sm" id="btnDownloadAll" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 批量下载 (ZIP)</button>
      <button class="btn-outline btn-sm" id="btnClear" disabled>清空列表</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-card">
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-label">图片数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statOriginal">0 MB</div>
        <div class="stat-label">原始总大小</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statCompressed">0 MB</div>
        <div class="stat-label">压缩后总大小</div>
      </div>
      <div class="stat-card">
        <div class="stat-val green" id="statSaved">0%</div>
        <div class="stat-label">节省空间</div>
      </div>
    </div>

    <!-- Image List -->
    <div class="image-list" id="imageList"></div>

  </div>
</section>

<div class="toast" id="toast"></div>

<script>
/* ============================================
   WLi Tools - 在线工具集
   © 2025 WLi. All rights reserved.
   Developer: WLi
   ============================================ */
(function() {
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const imageList  = document.getElementById('imageList');
  const qualityInp = document.getElementById('quality');
  const qualityVal = document.getElementById('qualityVal');
  const maxSizeInp = document.getElementById('maxSize');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const statsRow   = document.getElementById('statsRow');
  const toastEl    = document.getElementById('toast');
  const btnCompressAll = document.getElementById('btnCompressAll');
  const btnDownloadAll = document.getElementById('btnDownloadAll');
  const btnClear    = document.getElementById('btnClear');

  let images = [];
  let idCounter = 0;
  let selectedFormat = 'image/jpeg';

  // ─── Helpers ─────────────────────────────
  function formatBytes(bytes) {
    if (!bytes && bytes !== 0) return '—';
    if (bytes === 0) return '0 B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    if (kb >= 1) return kb.toFixed(1) + ' KB';
    return bytes + ' B';
  }
  function formatBytesCompact(bytes) {
    if (!bytes && bytes !== 0) return '—';
    if (bytes === 0) return '0B';
    const mb = bytes / (1024 * 1024);
    if (mb >= 1) return mb.toFixed(2) + ' MB';
    const kb = bytes / 1024;
    return kb.toFixed(1) + ' KB';
  }
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }
  function getExt(fmt) {
    return { 'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/avif':'avif','image/svg+xml':'svg','application/pdf':'pdf','image/gif':'gif' }[fmt] || 'jpg';
  }

  // ─── Settings ─────────────────────────────
  qualityInp.addEventListener('input', () => { qualityVal.textContent = qualityInp.value; });
  document.querySelectorAll('#formatGroup .segment-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#formatGroup .segment-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      selectedFormat = b.dataset.fmt;
    });
  });

  // ─── AVIF support check ──────────────────
  (function() {
    const c = document.createElement('canvas'); c.width = 1; c.height = 1;
    c.toBlob(blob => {
      if (!blob || blob.type !== 'image/avif') {
        const btn = document.querySelector('[data-fmt="image/avif"]');
        if (btn) { btn.style.opacity = '0.4'; btn.title = '当前浏览器不支持 AVIF'; btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); showToast('当前浏览器不支持 AVIF'); }); }
      }
    }, 'image/avif');
  })();

  // ─── Touch & Drag Upload ─────────────────
  let touchStartY = 0;
  let touchHandled = false;

  dropzone.addEventListener('click', (e) => {
    if (touchHandled) { touchHandled = false; return; }
    fileInput.click();
  });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
  dropzone.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; dropzone.style.transform = 'scale(0.98)'; }, { passive: true });
  dropzone.addEventListener('touchend', (e) => {
    dropzone.style.transform = '';
    if (Math.abs(e.changedTouches[0].clientY - touchStartY) < 10) { touchHandled = true; fileInput.click(); }
  }, { passive: true });
  fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

  function handleFiles(files) {
    const validTypes = ['image/jpeg','image/png','image/webp','image/avif','image/svg+xml','image/bmp','image/tiff','image/gif','image/apng','application/pdf'];
    let added = 0;
    for (const f of files) {
      if (!validTypes.includes(f.type) && !f.name.match(/\.(jpg|jpeg|png|webp|avif|svg|bmp|tiff|tif|gif|apng|pdf)$/i)) continue;
      const imgObj = { id: ++idCounter, file: f, compressedBlob: null, compressedSize: null, status: 'pending', frames: null, delays: null, isAnimated: false, _thumbUrl: null };
      images.push(imgObj);
      added++;
      // Pre-process PDF / GIF
      if (f.type === 'application/pdf' || f.name.match(/\.pdf$/i)) {
        processPdfFile(imgObj);
      } else if (f.type === 'image/gif' || f.name.match(/\.gif$/i)) {
        processGifFile(imgObj);
      }
    }
    if (added > 0) { showToast(`已添加 ${added} 张图片`); renderList(); }
    else { showToast('未识别到有效图片文件'); }
  }

  // Pre-process PDF: render first page as image
  function processPdfFile(imgObj) {
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const typedArray = new Uint8Array(e.target.result);
      pdfjsLib.getDocument({ data: typedArray }).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          const scale = 2;
          const viewport = page.getViewport({ scale: scale });
          const pdfCanvas = document.createElement('canvas');
          pdfCanvas.width = viewport.width;
          pdfCanvas.height = viewport.height;
          const pdfCtx = pdfCanvas.getContext('2d');
          page.render({ canvasContext: pdfCtx, viewport: viewport }).promise.then(function() {
            pdfCanvas.toBlob(function(blob) {
              imgObj._pdfBlob = blob;
              imgObj._pdfName = imgObj.file.name.replace(/\.pdf$/i, '.png');
              renderCard(imgObj);
            }, 'image/png');
          });
        });
      }).catch(function(err) {
        imgObj.status = 'error';
        imgObj.compressError = 'PDF 解析失败';
        renderCard(imgObj);
      });
    };
    reader.readAsArrayBuffer(imgObj.file);
  }

  // Pre-process GIF: parse animation frames
  function processGifFile(imgObj) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const gif = gifuct.parseGIF(e.target.result);
        const frames = gifuct.decompressFrames(gif, true);
        if (frames.length > 1) {
          const gifW = gif.lsd.width;
          const gifH = gif.lsd.height;
          imgObj.isAnimated = true;
          imgObj.delays = frames.map(f => (f.delay || 10) * 10);
          imgObj.frames = frames.map(f => {
            const c = document.createElement('canvas');
            c.width = gifW; c.height = gifH;
            const ctx = c.getContext('2d');
            const imgData = ctx.createImageData(gifW, gifH);
            imgData.data.set(f.patch);
            ctx.putImageData(imgData, 0, 0);
            return c;
          });
        }
      } catch(err) {
        console.warn('GIF parse failed:', err);
      }
    };
    reader.readAsArrayBuffer(imgObj.file);
  }

  function removeImage(id) {
    const im = images.find(i => i.id === id);
    if (im && im._thumbUrl) URL.revokeObjectURL(im._thumbUrl);
    images = images.filter(im => im.id !== id);
    renderList();
  }
  function findCardById(id) { return document.querySelector(`[data-id="${id}"]`); }

  // ─── Compression ─────────────────────────
  async function compressImage(imgObj) {
    const quality = parseInt(qualityInp.value) / 100;
    const maxDim = parseInt(maxSizeInp.value) || 0;
    const outFmt = selectedFormat;

    // ── Source blob: use PDF pre-rendered image if available ──
    const sourceBlob = imgObj._pdfBlob || imgObj.file;

    // ── Animated GIF → GIF output ──
    if (imgObj.isAnimated && outFmt === 'image/gif' && imgObj.frames) {
      return new Promise((resolve, reject) => {
        const origW = imgObj.frames[0].width;
        const origH = imgObj.frames[0].height;
        let w = origW, h = origH;
        if (maxDim > 0 && (w > maxDim || h > maxDim)) {
          const r = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const encoder = new GIF({
          workers: 2, quality: 10, width: w, height: h,
          workerURL: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });
        let frameCount = 0;
        imgObj.frames.forEach((fc, idx) => {
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const fctx = c.getContext('2d');
          fctx.imageSmoothingEnabled = true;
          fctx.imageSmoothingQuality = 'high';
          fctx.drawImage(fc, 0, 0, w, h);
          encoder.addFrame(fctx, { delay: imgObj.delays[idx], copy: true });
          frameCount++;
          if (frameCount >= 200) return;
        });
        encoder.on('finished', blob => resolve({ blob, size: blob.size }));
        encoder.on('error', err => reject(err));
        encoder.render();
      });
    }

    // ── Static image processing ──
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(sourceBlob);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.naturalWidth, h = img.naturalHeight;
        if (maxDim > 0 && (w > maxDim || h > maxDim)) { const r = Math.min(maxDim / w, maxDim / h); w = Math.round(w * r); h = Math.round(h * r); }
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d'); ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
        // White background for JPEG / PDF (no alpha support)
        if (outFmt === 'image/jpeg' || outFmt === 'application/pdf') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }
        ctx.drawImage(img, 0, 0, w, h);

        // ── PDF output ──
        if (outFmt === 'application/pdf') {
          cv.toBlob(blob => {
            if (!blob) { reject(new Error('toBlob 返回空')); return; }
            const reader = new FileReader();
            reader.onload = () => {
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF({
                orientation: w > h ? 'landscape' : 'portrait',
                unit: 'px', format: [w, h]
              });
              pdf.addImage(reader.result, 'PNG', 0, 0, w, h);
              const pdfBlob = pdf.output('blob');
              resolve({ blob: pdfBlob, size: pdfBlob.size });
            };
            reader.readAsDataURL(blob);
          }, 'image/png');
          return;
        }

        // ── Static image output ──
        cv.toBlob(blob => { blob ? resolve({ blob, size: blob.size }) : reject(new Error('toBlob 返回空')); }, outFmt, (outFmt === 'image/png' || outFmt === 'image/svg+xml') ? undefined : quality);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('图片加载失败')); };
      img.src = url;
    });
  }

  async function compressAll() {
    const pending = images.filter(im => im.status === 'pending');
    if (!pending.length) { showToast('没有需要压缩的图片'); return; }
    btnCompressAll.disabled = true;
    progressWrap.classList.add('visible');
    let done = 0; const total = pending.length;
    for (const imgObj of pending) {
      imgObj.status = 'processing'; renderCard(imgObj);
      try { const r = await compressImage(imgObj); imgObj.compressedBlob = r.blob; imgObj.compressedSize = r.size; imgObj.status = 'done'; }
      catch (err) { imgObj.status = 'error'; imgObj.compressError = err.message; }
      done++; progressFill.style.width = ((done / total) * 100) + '%'; progressText.textContent = `压缩进度：${done} / ${total}`;
      renderCard(imgObj); updateStats(); enableButtons();
    }
    setTimeout(() => { progressWrap.classList.remove('visible'); progressFill.style.width = '0%'; }, 1200);
    btnCompressAll.disabled = false; enableButtons(); updateStats();
    showToast(`压缩完成！共处理 ${total} 张图片`);
  }

  // ─── Render ──────────────────────────────
  function renderList() {
    images.forEach(im => { if (im._thumbUrl) { URL.revokeObjectURL(im._thumbUrl); im._thumbUrl = null; } });
    if (!images.length) { imageList.innerHTML = ''; statsRow.style.display = 'none'; enableButtons(); return; }
    imageList.innerHTML = images.map(im => cardHTML(im)).join('');
    updateStats(); enableButtons();
  }
  function renderCard(im) { const c = findCardById(im.id); if (c) c.outerHTML = cardHTML(im); }

  function cardHTML(im) {
    if (im._thumbUrl) URL.revokeObjectURL(im._thumbUrl);
    // For PDF, use pre-rendered image blob; for others use the file directly
    const thumbSource = im._pdfBlob || im.file;
    im._thumbUrl = URL.createObjectURL(thumbSource);
    const origSize = im.file.size, compSize = im.compressedSize;
    const done = im.status === 'done', processing = im.status === 'processing', error = im.status === 'error';
    let sizeHTML = '';
    if (done) {
      const pct = ((1 - compSize / origSize) * 100).toFixed(1), bigger = compSize >= origSize;
      sizeHTML = `<span class="card-size original">${formatBytesCompact(origSize)}</span><span class="card-size arrow">→</span><span class="card-size compressed">${formatBytesCompact(compSize)}</span><span style="font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap">${bigger?'+'+(pct*-1):+pct}%</span>`;
    } else if (processing) { sizeHTML = `<span style="color:var(--link);font-size:12px">压缩中…</span>`; }
    else if (error) { sizeHTML = `<span style="color:var(--red);font-size:12px">失败</span>`; }
    else { sizeHTML = `<span class="card-size original">${formatBytesCompact(origSize)}</span>`; }
    const cls = done ? 'done' : (processing ? 'processing' : '');
    const dlBtn = done ? `<button class="card-btn" onclick="event.stopPropagation();downloadSingle(${im.id})" title="下载"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>` : '';
    const srcLabel = im.file.type === 'application/pdf' ? 'PDF' : (im.file.type.replace('image/','').toUpperCase() || im.file.name.split('.').pop().toUpperCase());
    return `<div class="image-card ${cls}" data-id="${im.id}"><img class="card-thumb" src="${im._thumbUrl}" alt="" loading="lazy"><div class="card-info"><div class="card-name" title="${im.file.name}">${im.file.name}</div><div class="card-meta"><span>${srcLabel}</span>${done?`<span class="reduced">→ ${getExt(selectedFormat).toUpperCase()}</span>`:''}</div></div><div class="card-size-group">${sizeHTML}</div><div class="card-actions">${dlBtn}<button class="card-btn danger" onclick="event.stopPropagation();removeImage(${im.id})" title="移除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>`;
  }

  function updateStats() {
    const total = images.length, original = images.reduce((s, im) => s + im.file.size, 0);
    const doneList = images.filter(im => im.status === 'done'), compressed = doneList.reduce((s, im) => s + (im.compressedSize || 0), 0);
    const pct = original > 0 ? ((1 - compressed / original) * 100).toFixed(1) : '0', saved = compressed > 0 ? pct : '—';
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statOriginal').textContent = formatBytes(original);
    document.getElementById('statCompressed').textContent = formatBytes(compressed || 0);
    document.getElementById('statSaved').textContent = saved === '—' ? '—' : saved + '%';
    document.getElementById('statSaved').style.color = parseFloat(saved) > 0 ? 'var(--green)' : (parseFloat(saved) < 0 ? 'var(--red)' : 'var(--ink)');
    statsRow.style.display = total > 0 ? 'grid' : 'none';
  }

  function enableButtons() {
    const total = images.length, pending = images.filter(im => im.status === 'pending').length, done = images.filter(im => im.status === 'done').length;
    btnCompressAll.disabled = pending === 0; btnDownloadAll.disabled = done === 0; btnClear.disabled = total === 0;
  }

  // ─── Download ────────────────────────────
  function downloadSingle(id) {
    const im = images.find(i => i.id === id); if (!im || !im.compressedBlob) return;
    const ext = getExt(selectedFormat), name = im.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
    const url = URL.createObjectURL(im.compressedBlob); const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  async function downloadAll() {
    const doneList = images.filter(im => im.status === 'done' && im.compressedBlob); if (!doneList.length) return;
    const ext = getExt(selectedFormat), zip = new JSZip();
    showToast('正在打包 ZIP...');
    for (const im of doneList) zip.file(im.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext, im.compressedBlob);
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob); const a = document.createElement('a'); a.href = url; a.download = 'compressed_images.zip'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000); showToast('ZIP 下载已开始！');
  }
  function clearAll() {
    images.forEach(im => { if (im._thumbUrl) URL.revokeObjectURL(im._thumbUrl); });
    images = []; imageList.innerHTML = ''; statsRow.style.display = 'none'; enableButtons(); showToast('列表已清空');
  }

  btnCompressAll.addEventListener('click', compressAll);
  btnDownloadAll.addEventListener('click', downloadAll);
  btnClear.addEventListener('click', clearAll);
  window.removeImage = removeImage;
  window.downloadSingle = downloadSingle;
})();
</script>
