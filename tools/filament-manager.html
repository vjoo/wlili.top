                                            <button class="btn-icon edit" onclick="app.editKnowledge('${item.id}')" title="编辑"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                                            <button class="btn-icon delete" onclick="app.deleteKnowledge('${item.id}')" title="删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                        </div>
                                    </td>
                                </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                `}
            `;
        },

        // 查看知识库详情
        viewKnowledgeDetail(id) {
            const item = this.data.knowledge.find(k => k.id === id);
            if (!item) return;

            const cred = CREDIBILITY_LEVELS.find(c => c.value === item.credibility);
            const relatedPresets = item.relatedPresetIds.map(pid => {
                const p = this.data.presets.find(pr => pr.id === pid);
                return p ? p.name : pid;
            }).join(', ') || '无';

            let detailHtml = `
                <div class="form-grid">
                    <div class="form-group full-width"><label class="form-label">标题</label><div class="form-input" style="background:var(--bg-primary);font-size:16px;font-weight:600">${item.title}</div></div>
                    <div class="form-group"><label class="form-label">可信度</label><div class="form-input" style="background:var(--bg-primary)"><span class="credibility-stars">${cred?.stars || ''}</span> ${cred?.label || item.credibility}</div></div>
                    <div class="form-group full-width"><label class="form-label">现象描述</label><div class="form-textarea" style="background:var(--bg-primary);min-height:60px">${item.phenomenon}</div></div>
                    <div class="form-group full-width"><label class="form-label">解决方案</label><div class="form-textarea" style="background:var(--bg-primary);min-height:100px;white-space:pre-wrap">${item.solution}</div></div>
                    <div class="form-group full-width"><label class="form-label">标签</label><div>${item.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</div></div>
                    <div class="form-group full-width"><label class="form-label">关联预设</label><div class="form-input" style="background:var(--bg-primary)">${relatedPresets}</div></div>
            `;

            if (item.imageBase64) {
                detailHtml += `
                    <div class="form-group full-width">
                        <label class="form-label">参考图片</label>
                        <img src="${item.imageBase64}" style="max-width:300px;max-height:300px;border-radius:var(--radius-sm);cursor:pointer" onclick="app.showImageModal('${item.imageBase64}')">
                    </div>
                `;
            }

            detailHtml += '</div>';

            this.openModal('知识库详情', detailHtml, [
                { text: '编辑', class: 'btn-primary', action: () => { this.closeModal(); setTimeout(() => this.editKnowledge(id), 100); } },
                { text: '关闭', class: 'btn-secondary', action: () => this.closeModal() }
            ]);
        },

        // 打开新增知识库
        openAddKnowledgeModal() {
            this.openKnowledgeModal(null);
        },

        // 编辑知识库
        editKnowledge(id) {
            const item = this.data.knowledge.find(k => k.id === id);
            if (!item) return;
            this.openKnowledgeModal(item);
        },

        // 知识库模态框
        openKnowledgeModal(item) {
            const isEdit = !!item;
            const data = item || {};
            const currentImage = data.imageBase64 || '';

            // 构建预设选项
            const presetOptions = this.data.presets.map(p => `
                <option value="${p.id}" ${(data.relatedPresetIds || []).includes(p.id) ? 'selected' : ''}>${p.name} (${PRESET_SUBTYPES.find(t => t.value === p.subType)?.label || p.subType})</option>
            `).join('');

            this.openModal(isEdit ? '编辑知识库' : '新增知识库', `
                <form id="knowledgeForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label class="form-label">标题 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="k_title" value="${data.title || ''}" required>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">现象描述 <span class="required">*</span></label>
                            <textarea class="form-textarea" id="k_phenomenon" required>${data.phenomenon || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">可信度 <span class="required">*</span></label>
                            <select class="form-select" id="k_credibility" required>
                                <option value="">请选择</option>
                                ${CREDIBILITY_LEVELS.map(c => `<option value="${c.value}" ${data.credibility === c.value ? 'selected' : ''}>${c.label} ${c.stars}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">解决方案 <span class="required">*</span></label>
                            <textarea class="form-textarea" id="k_solution" style="min-height:120px" required>${data.solution || ''}</textarea>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">关联预设</label>
                            <select class="form-select" id="k_relatedPresets" multiple>
                                ${presetOptions}
                            </select>
                            <div class="form-hint">按住 Ctrl/Cmd 可多选</div>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">标签（用逗号分隔）</label>
                            <input type="text" class="form-input" id="k_tags" value="${(data.tags || []).join(', ')}" placeholder="例如：拉丝, PETG, 调参">
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">参考图片</label>
                            <div class="image-upload-area" onclick="document.getElementById('k_imageInput').click()">
                                <div style="display:flex;align-items:center;gap:6px;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> 点击上传图片</div>
                                <div class="form-hint">支持 JPG/PNG，最大 2MB</div>
                            </div>
                            <input type="file" id="k_imageInput" class="hidden-input" accept="image/*" onchange="app.handleKnowledgeImageUpload(this)">
                            <div id="k_imagePreviewContainer" style="margin-top:12px;${currentImage ? '' : 'display:none'}">
                                <div class="image-preview-container">
                                    <img id="k_imagePreview" class="image-preview" src="${currentImage}" style="${currentImage ? '' : 'display:none'}">
                                    <button type="button" class="image-remove-btn" onclick="app.removeKnowledgeImage()">×</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            `, [
                { text: '保存', class: 'btn-primary', action: () => this.saveKnowledge(isEdit ? item.id : '') },
                { text: '取消', class: 'btn-secondary', action: () => this.closeModal() }
            ]);

            // 保存当前图片引用以便上传后更新
            this._currentKnowledgeImage = currentImage;
        },

        // 处理知识库图片上传
        async handleKnowledgeImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            try {
                const base64 = await Utils.fileToBase64(file);
                this._currentKnowledgeImage = base64;

                const preview = document.getElementById('k_imagePreview');
                const container = document.getElementById('k_imagePreviewContainer');
                if (preview && container) {
                    preview.src = base64;
                    preview.style.display = 'block';
                    container.style.display = 'block';
                }
            } catch (err) {
                alert(err.message);
            }

            // 清空 input 以便重复选择同一文件
            input.value = '';
        },

        // 移除知识库图片
        removeKnowledgeImage() {
            this._currentKnowledgeImage = null;
            const preview = document.getElementById('k_imagePreview');
            const container = document.getElementById('k_imagePreviewContainer');
            if (preview) preview.style.display = 'none';
            if (container) container.style.display = 'none';
        },

        // 保存知识库
        saveKnowledge(id) {
            const errors = [];

            const title = document.getElementById('k_title').value.trim();
            const phenomenon = document.getElementById('k_phenomenon').value.trim();
            const credibility = document.getElementById('k_credibility').value;
            const solution = document.getElementById('k_solution').value.trim();

            if (!title) errors.push('标题不能为空');
            if (!phenomenon) errors.push('现象描述不能为空');
            if (!credibility) errors.push('可信度不能为空');
            if (!solution) errors.push('解决方案不能为空');

            // 获取关联预设
            const relatedSelect = document.getElementById('k_relatedPresets');
            const relatedPresetIds = Array.from(relatedSelect.selectedOptions).map(opt => opt.value);

            // 解析标签
            const tagsInput = document.getElementById('k_tags').value;
            const tags = tagsInput.split(/[,，]/).map(t => t.trim()).filter(t => t);

            if (errors.length > 0) {
                alert('请修正以下错误：\n' + errors.join('\n'));
                return;
            }

            const knowledge = {
                id: id || Utils.generateId('kb'),
                title,
                phenomenon,
                machine: 'X2D',
                credibility,
                solution,
                relatedPresetIds,
                tags,
                imageBase64: this._currentKnowledgeImage || null
            };

            if (id) {
                const idx = this.data.knowledge.findIndex(k => k.id === id);
                if (idx !== -1) this.data.knowledge[idx] = knowledge;
            } else {
                this.data.knowledge.push(knowledge);
            }

            StorageService.saveKnowledge(this.data.knowledge);
            this._currentKnowledgeImage = null;
            this.closeModal();
            this.render();
        },

        // 删除知识库
        deleteKnowledge(id) {
            this.confirm('确认删除', '确定要删除这条知识库记录吗？此操作不可恢复。', () => {
                this.data.knowledge = this.data.knowledge.filter(k => k.id !== id);
                StorageService.saveKnowledge(this.data.knowledge);
                this.render();
            });
        },

        // ============================================
        // 全局搜索
        // ============================================

        handleSearch(keyword) {
            const dropdown = document.getElementById('searchDropdown');
            if (!keyword.trim()) {
                dropdown.classList.remove('active');
                return;
            }

            const kw = keyword.toLowerCase().trim();
            const results = {
                filaments: [],
                presets: [],
                knowledge: []
            };

            // 搜索耗材
            results.filaments = this.data.filaments.filter(f =>
                f.name.toLowerCase().includes(kw) ||
                f.brand.toLowerCase().includes(kw) ||
                f.type.toLowerCase().includes(kw) ||
                (f.notes && f.notes.toLowerCase().includes(kw))
            ).slice(0, 5);

            // 搜索预设
            results.presets = this.data.presets.filter(p =>
                p.name.toLowerCase().includes(kw) ||
                (p.notes && p.notes.toLowerCase().includes(kw))
            ).slice(0, 5);

            // 搜索本地知识库
            results.knowledge = this.data.knowledge.filter(k =>
                k.title.toLowerCase().includes(kw) ||
                k.phenomenon.toLowerCase().includes(kw) ||
                k.solution.toLowerCase().includes(kw) ||
                k.tags.some(t => t.toLowerCase().includes(kw))
            ).slice(0, 5);

            // 搜索官方文档索引（新增）
            results.official = officialDocs.filter(doc =>
                doc.title.toLowerCase().includes(kw) ||
                doc.summary.toLowerCase().includes(kw) ||
                doc.tags.some(t => t.toLowerCase().includes(kw))
            ).slice(0, 5);

            const hasResults = results.filaments.length > 0 ||
                               results.presets.length > 0 ||
                               results.knowledge.length > 0 ||
                               results.official.length > 0;

            if (!hasResults) {
                dropdown.innerHTML = '<div class="search-section"><div class="search-item">未找到匹配结果</div></div>';
                dropdown.classList.add('active');
                return;
            }

            let html = '';

            // 本地耗材结果
            if (results.filaments.length > 0) {
                html += `
                    <div class="search-section">
                        <div class="search-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>耗材</div>
                        ${results.filaments.map(f => `
                            <div class="search-item" onclick="app.goToSearchResult('filaments', '${f.id}')">
                                <div class="search-item-source">本地知识库</div>
                                <div class="search-item-title">${f.name}</div>
                                <div class="search-item-desc">${f.brand} · ${f.type} · ¥${f.price.toFixed(1)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 本地预设结果
            if (results.presets.length > 0) {
                html += `
                    <div class="search-section">
                        <div class="search-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>预设</div>
                        ${results.presets.map(p => `
                            <div class="search-item" onclick="app.goToSearchResult('presets', '${p.id}')">
                                <div class="search-item-source">本地知识库</div>
                                <div class="search-item-title">${p.name}</div>
                                <div class="search-item-desc">${PRESET_SUBTYPES.find(t => t.value === p.subType)?.label || p.subType} · ${p.machine}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 本地知识库结果
            if (results.knowledge.length > 0) {
                html += `
                    <div class="search-section">
                        <div class="search-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>知识库</div>
                        ${results.knowledge.map(k => `
                            <div class="search-item" onclick="app.goToSearchResult('knowledge', '${k.id}')">
                                <div class="search-item-source">本地知识库</div>
                                <div class="search-item-title">${k.title}</div>
                                <div class="search-item-desc">${k.tags.map(t => `#${t}`).join(' ')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 官方文档结果（新增）
            if (results.official.length > 0) {
                html += `
                    <div class="search-section">
                        <div class="search-section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>官方文档</div>
                        ${results.official.map(doc => `
                            <div class="search-item search-item-official" onclick="app.openOfficialDocLink('${doc.url}')">
                                <div class="search-item-source">官方文档</div>
                                <div class="search-item-title">${doc.title} <span style="float:right;color:var(--accent-color)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span></div>
                                <div class="search-item-desc">${doc.summary}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            dropdown.innerHTML = html;
            dropdown.classList.add('active');
        },

        // 跳转到搜索结果
        goToSearchResult(module, id) {
            document.getElementById('searchDropdown').classList.remove('active');
            document.getElementById('globalSearch').value = '';
            this.switchModule(module);

            // 高亮对应条目（延迟等待渲染完成）
            setTimeout(() => {
                if (module === 'filaments') this.viewFilamentDetail(id);
                else if (module === 'presets') this.viewPresetDetail(id);
                else if (module === 'knowledge') this.viewKnowledgeDetail(id);
            }, 100);
        },

        // 打开官方文档链接（新增）
        openOfficialDocLink(url) {
            const dropdown = document.getElementById('searchDropdown');
            if (dropdown) dropdown.classList.remove('active');
            const globalSearch = document.getElementById('globalSearch');
            if (globalSearch) globalSearch.value = '';
            window.open(url, '_blank');
        },

        // ============================================
        // 筛选与排序
        // ============================================

        setFilter(module, field, value) {
            this.filters[module][field] = value;
            this.render();
        },

        setSort(module, value) {
            if (!value) {
                this.sort[module] = { field: '', order: 'asc' };
            } else {
                const [field, order] = value.split('_');
                this.sort[module] = { field, order };
            }
            this.render();
        },

        // ============================================
        // 导入导出
        // ============================================

        // 导出数据
        exportData() {
            const data = StorageService.exportAll();
            Utils.downloadJSON(data, `bambu_backup_${new Date().toISOString().split('T')[0]}.json`);
        },

        // 导入数据
        async importData(input) {
            const file = input.files[0];
            if (!file) return;

            try {
                const data = await Utils.readFileAsJSON(file);
                this.confirm('确认导入', '导入将覆盖现有所有数据，确定继续吗？', () => {
                    StorageService.importAll(data);
                    this.loadData();
                    this.render();
                    alert('数据导入成功！');
                });
            } catch (err) {
                alert('导入失败：' + err.message);
            }

            input.value = '';
        },

        // ============================================
        // 设置
        // ============================================

        showSettings() {
            this.openModal('设置', `
                <div class="settings-section">
                    <div class="settings-title">数据管理</div>
                    <div class="danger-zone">
                        <div class="danger-zone-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>危险区域</div>
                        <div class="danger-zone-hint">清空所有数据后无法恢复，请谨慎操作。</div>
                        <button class="btn-danger" onclick="app.clearAllData()">清空所有数据</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-title">关于</div>
                    <p style="font-size:13px;color:var(--text-secondary)">
                        拓竹 3D 打印机参数知识库 v1.0<br>
                        纯本地运行，数据存储于浏览器 localStorage。<br>
                        建议定期导出备份数据。
                    </p>
                </div>
            `, [
                { text: '关闭', class: 'btn-secondary', action: () => this.closeModal() }
            ]);
        },

        // 清空所有数据
        clearAllData() {
            this.confirm('确认清空', '确定要清空所有数据吗？此操作不可恢复！', () => {
                StorageService.clearAll();
                this.data = { filaments: [], presets: [], knowledge: [] };
                this.render();
                this.closeModal();
                alert('所有数据已清空');
            });
        },

        // ============================================
        // 模态框通用方法
        // ============================================

        openModal(title, bodyHtml, buttons = []) {
            const modal = document.getElementById('modal');
            const overlay = document.getElementById('modalOverlay');

            const buttonsHtml = buttons.map((btn, idx) =>
                `<button class="${btn.class}" onclick="app._modalButtons[${idx}].action()">${btn.text}</button>`
            ).join('');

            modal.innerHTML = `
                <div class="modal-header">
                    <div class="modal-title">${title}</div>
                    <button class="modal-close" onclick="app.closeModal()">×</button>
                </div>
                <div class="modal-body">${bodyHtml}</div>

        // 判断颜色是否为浅色（需要加边框才能看清）
        isLightColor(hex) {
            if (!hex || hex === 'transparent') return true;
            const c = hex.replace('#', '');
            if (c.length === 3) {
                const r = parseInt(c[0]+c[0],16), g = parseInt(c[1]+c[1],16), b = parseInt(c[2]+c[2],16);
                return (r * 299 + g * 587 + b * 114) / 1000 > 200;
            }
            if (c.length >= 6) {
                const r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
                return (r * 299 + g * 587 + b * 114) / 1000 > 200;
            }
            return false;
        },

        // 品牌-名称联动数据

        // 品牌选择变化时更新名称下拉
        onBrandChange(value) {
            const brandInput = document.getElementById('f_brandInput');
            const brandHidden = document.getElementById('f_brand');
            const nameSelect = document.getElementById('f_nameSelect');
            const nameInput = document.getElementById('f_nameInput');
            const nameHidden = document.getElementById('f_name');

            if (value === '自定义') {
                if (brandInput) {
                    brandInput.style.display = '';
                    brandInput.focus();
                }
                if (brandHidden) brandHidden.value = '';
                // 品牌自定义时，名称也显示自定义输入
                if (nameSelect) {
                    nameSelect.innerHTML = '<option value="自定义" selected>自定义</option>';
                }
                if (nameInput) {
                    nameInput.style.display = '';
                    nameInput.value = '';
                }
                if (nameHidden) nameHidden.value = '';
                return;
            }

            if (brandInput) {
                brandInput.style.display = 'none';
                brandInput.value = '';
            }
            if (brandHidden) brandHidden.value = value;

            // 更新名称下拉
            if (!nameSelect) return;
            if (nameInput) nameInput.style.display = 'none';
            if (nameHidden) nameHidden.value = '';

                nameSelect.innerHTML = '<option value="">请选择品牌后选择名称</option>';

                html += `<option value="${p}">${p}</option>`;

            nameSelect.style.display = '';

        // 自定义品牌输入时同步到 hidden
        onBrandInputChange(value) {

        // 名称选择变化：自定义时显示输入框（和品牌一样的交互：下拉框不隐藏）
        onNameChange(value) {
            const nameSelect = document.getElementById('f_nameSelect');
            const nameInput = document.getElementById('f_nameInput');
            const nameHidden = document.getElementById('f_name');
            if (!nameSelect || !nameInput) return;
            if (value === '自定义') {
                nameInput.style.display = '';
                nameInput.value = '';
                nameInput.focus();
                if (nameHidden) nameHidden.value = '';
            } else {
                nameInput.style.display = 'none';
                nameInput.value = '';
                if (nameHidden) nameHidden.value = value;
            }
        },

        // 自定义名称输入时同步到 hidden
        onNameInputChange(value) {

            if (nameHidden) nameHidden.value = value.trim();
        },

        // 盘型选择变化时更新价格
        onSpoolTypeChange(spoolType) {
            const priceInput = document.getElementById('f_price');
            if (!priceInput) return;
            // 无盘比有盘便宜约 10-15 元
            const currentPrice = parseFloat(priceInput.value) || 0;
            if (spoolType === '无盘') {
                // 如果当前价格为空或默认有盘价格，自动调整为无盘价格
                if (currentPrice === 0 || currentPrice >= 80) {
                    priceInput.value = '';
                    priceInput.placeholder = '无盘价格（通常比有盘低10-15元）';
                }
            } else {
                priceInput.placeholder = '';
            }
        },

        // 类型选择变化
        onTypeChange(value) {
            const typeInput = document.getElementById('f_typeInput');
            const typeHidden = document.getElementById('f_type');
            if (value === '自定义') {
                if (typeInput) {
                    typeInput.style.display = '';
                    typeInput.focus();
                }
                if (typeHidden) typeHidden.value = '';
            } else {
                if (typeInput) {
                    typeInput.style.display = 'none';
                    typeInput.value = '';
                }
                if (typeHidden) typeHidden.value = value;
            }
        },

        // 自定义类型输入时同步到 hidden
        onTypeInputChange(value) {
            const typeHidden = document.getElementById('f_type');
            if (typeHidden) typeHidden.value = value.trim();
        },

        // 套装模式切换
        onBundleChange(checked) {
            const container = document.getElementById('bundleItemsContainer');
            if (container) {
                container.style.display = checked ? 'block' : 'none';
            }
            if (checked) {
                const list = document.getElementById('bundleItemsList');

                    this.addBundleItem();
                }
            }
        },

        // 添加一盘套装耗材
        addBundleItem() {
            const list = document.getElementById('bundleItemsList');
            if (!list) return;
            const index = list.children.length;
            const div = document.createElement('div');
            div.className = 'bundle-item-row';
            div.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--bg-hover);border-radius:var(--radius-sm);';
            div.innerHTML = `
                <input type="text" class="form-input bundle-color-name" placeholder="颜色名" oninput="app.onBundleColorNameChange(this)">
                <div class="color-picker-wrap" style="width:100%;">
                    <div class="form-input color-input-with-swatch" style="padding:0;">
                        <input type="text" class="form-input bundle-color-value" placeholder="颜色值" style="border:none!important;box-shadow:none!important;padding:9px 12px;background:transparent;" oninput="app.updateBundleColorPreview(this)" onfocus="app.openBundleColorPicker(this)">
                        <div class="color-input-swatch bundle-color-swatch" style="background:transparent;" onclick="app.toggleBundleColorPicker(event,this)"></div>
                    </div>
                    <div class="color-picker-panel bundle-color-panel"></div>
                </div>
                <button type="button" class="btn-icon delete" onclick="app.removeBundleItem(${index})" title="删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            `;
            list.appendChild(div);
            this.refreshBundleItemIndexes();
        },

        // 删除一盘套装耗材
        removeBundleItem(index) {
            const list = document.getElementById('bundleItemsList');
            if (!list) return;
            const rows = list.querySelectorAll('.bundle-item-row');
            if (rows[index]) {
                rows[index].remove();
                this.refreshBundleItemIndexes();
            }
        },

        // 刷新套装行索引
        refreshBundleItemIndexes() {
            const list = document.getElementById('bundleItemsList');
            if (!list) return;
            const rows = list.querySelectorAll('.bundle-item-row');
            rows.forEach((row, idx) => {
                const btn = row.querySelector('button[onclick^="app.removeBundleItem"]');
                if (btn) btn.setAttribute('onclick', `app.removeBundleItem(${idx})`);
            });
        },

        // 渲染套装列表（用于编辑时回显）
        renderBundleItems(items) {
            if (!items || items.length === 0) return '';
            return items.map((item, index) => `
                <div class="bundle-item-row" style="display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--bg-hover);border-radius:var(--radius-sm);">
                    <input type="text" class="form-input bundle-color-name" placeholder="颜色名" value="${this.escHtml(item.colorName || '')}" oninput="app.onBundleColorNameChange(this)">
                    <div class="color-picker-wrap" style="width:100%;">
                        <div class="form-input color-input-with-swatch" style="padding:0;">
                            <input type="text" class="form-input bundle-color-value" placeholder="颜色值" value="${this.escHtml(item.colorValue || '')}" style="border:none!important;box-shadow:none!important;padding:9px 12px;background:transparent;" oninput="app.updateBundleColorPreview(this)" onfocus="app.openBundleColorPicker(this)">
                            <div class="color-input-swatch bundle-color-swatch" style="background:${item.colorValue || 'transparent'};" onclick="app.toggleBundleColorPicker(event,this)"></div>
                        </div>
                        <div class="color-picker-panel bundle-color-panel"></div>
                    </div>
                    <button type="button" class="btn-icon delete" onclick="app.removeBundleItem(${index})" title="删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                </div>
            `).join('');
        },

        // 套装行颜色名称变化时自动填充颜色值
        onBundleColorNameChange(input) {
            const row = input.closest('.bundle-item-row');
            if (!row) return;
            const trimmed = input.value.trim();
            const colorValueInput = row.querySelector('.bundle-color-value');
            const preview = row.querySelector('.bundle-color-preview');
            if (!colorValueInput || !preview) return;
            // 如果 colorNameMap 中有对应色值，自动填充
            if (this.colorNameMap[trimmed]) {
                colorValueInput.value = this.colorNameMap[trimmed];
                preview.style.background = this.colorNameMap[trimmed];
            }
        },

        // 更新套装行颜色预览
        updateBundleColorPreview(input) {
            const row = input.closest('.bundle-item-row');
            if (!row) return;
            const colorValueInput = row.querySelector('.bundle-color-value');
            const swatch = row.querySelector('.bundle-color-swatch');
            if (!colorValueInput || !swatch) return;
            const value = colorValueInput.value.trim();
            if (!value) {
                swatch.style.background = 'transparent';
                return;
            }
            if (/^#[0-9A-Fa-f]{3,8}$/.test(value)) {
                swatch.style.background = value;
            } else if (this.colorNameMap[value]) {
                swatch.style.background = this.colorNameMap[value];
            } else {
                const testEl = document.createElement('div');
                testEl.style.color = value;
                if (testEl.style.color !== '') {
                    swatch.style.background = value;
                } else {
                    swatch.style.background = 'transparent';
                }
            }
        },

        // 打开套装颜色选择器
        openBundleColorPicker(input) {
            const row = input.closest('.bundle-item-row');
            if (!row) return;
            const panel = row.querySelector('.bundle-color-panel');
            if (!panel) return;
            if (panel.classList.contains('open')) return;

            let html = '';
            this.colorPalette.forEach(group => {
                html += `<div class="color-picker-group"><div class="color-picker-group-label">${group.label}</div><div class="color-picker-grid">`;
                group.colors.forEach(([hex, name]) => {
                    const val = input.value.trim().toUpperCase() || '';
                    const isSelected = (val === hex) ? ' selected' : '';
                    const isTransparent = (name.includes('透明') || name.includes('Transparent'));
                    let bgStyle = '';
                    if (isTransparent) {
                        // 透明色：用实际颜色作为底色 + 棋盘格覆盖
                        bgStyle = 'background:' + hex + ';background-image:repeating-conic-gradient(rgba(226,232,240,0.7) 0% 25%,rgba(255,255,255,0.7) 0% 50%);background-size:8px 8px;';
                    } else {
                        bgStyle = 'background:' + hex + ';';
                    }
                    html += `<div class="color-picker-item${isSelected}" style="${bgStyle}" title="${name} (${hex})" onclick="app.selectBundleColor(event,this,'${hex}')"></div>`;
                });
                html += '</div></div>';
            });
            html += `<div style="margin-top:8px;border-top:1px solid #eee;padding-top:8px;"><div class="color-picker-grid"><div class="color-picker-item clear-color" onclick="app.selectBundleColor(event,this,'')" title="清除颜色"></div></div></div>`;

            panel.innerHTML = html;
            panel.classList.add('open');
        },

        // 切换套装颜色选择器
        toggleBundleColorPicker(e, swatch) {
            e.stopPropagation();
            const row = swatch.closest('.bundle-item-row');
            if (!row) return;
            const panel = row.querySelector('.bundle-color-panel');
            if (!panel) return;
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
            } else {
                document.querySelectorAll('.color-picker-panel.open').forEach(p => p.classList.remove('open'));
                const input = row.querySelector('.bundle-color-value');
                if (input) this.openBundleColorPicker(input);
            }
        },

        // 选择套装颜色
        selectBundleColor(e, el, hex) {
            e.stopPropagation();
            const row = el.closest('.bundle-item-row');
            if (!row) return;
            const input = row.querySelector('.bundle-color-value');
            const swatch = row.querySelector('.bundle-color-swatch');
            if (input) {
                input.value = hex || '';
                input.dispatchEvent(new Event('input', { bubbles: true }));
            }
            if (swatch) {
                swatch.style.background = hex || 'transparent';
            }
            const panel = row.querySelector('.bundle-color-panel');
            if (panel) panel.classList.remove('open');
        },

        // ============================================
        // 仪表台（Dashboard）模块
        // ============================================

        // HTML 转义辅助方法
        escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        },

        renderDashboardModule() {
            const filaments = this.data.filaments;
            if (!filaments || filaments.length === 0) {
                return `
                <div class="dashboard-dark">
                    <div class="dashboard-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <p>暂无耗材数据，请先添加耗材后再查看统计</p>
                    </div>
                </div>`;
            }

            // 计算统计数据
            const totalCost = filaments.reduce((s, f) => s + (parseFloat(f.price) || 0), 0);
            const totalCount = filaments.reduce((s, f) => {
                return s + (f.isBundle && f.bundleItems ? f.bundleItems.length : 1);
            }, 0);
            const totalWeight = filaments.reduce((s, f) => {
                if (f.isBundle && f.bundleItems && f.bundleItems.length > 0) {
                    return s + f.bundleItems.length * (parseFloat(f.netWeight) || 1000);
                }
                return s + (parseFloat(f.netWeight) || 1000);
            }, 0) / 1000; // 转换为 kg
            const brands = [...new Set(filaments.map(f => f.brand).filter(Boolean))];
            const brandCount = brands.length;

            // 已用完统计（不影响总量，单独计算）
            const consumedCount = filaments.reduce((s, f) => {
                if (f.isBundle && f.bundleItems) {
                    // 套装：只统计标记了 consumed=true 的子项
                    return s + f.bundleItems.filter(bi => bi.consumed).length;
                } else {
                    // 单盘：按 tags 统计
                    return s + (f.tags && f.tags.includes('已用完') ? 1 : 0);
                }
            }, 0);
            const consumedWeight = filaments.reduce((s, f) => {
                if (f.isBundle && f.bundleItems) {
                    // 套装：只统计标记了 consumed=true 的子项重量
                    return s + f.bundleItems.filter(bi => bi.consumed).length * (parseFloat(f.netWeight) || 1000);
                } else {
                    // 单盘：按 tags 统计
                    return s + (f.tags && f.tags.includes('已用完') ? (parseFloat(f.netWeight) || 1000) : 0);
                }
            }, 0) / 1000;

            // 图标辅助函数
            const getStatIcon = (type) => {
                const icons = {
                    dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
                    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
                    tag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
                    weight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3V5a3 3 0 0 0-3-3z"/><circle cx="12" cy="14" r="3"/></svg>'
                };
                return icons[type] || icons.box;
            };

            let html = '<div class="dashboard-dark">';

            // 统计卡片（横向 flex 4列）
            const stats = [
                { label: '总花费', value: '¥' + totalCost.toFixed(2), icon: 'dollar', bg: 'var(--accent-color)', consumed: null },
                { label: '耗材总数', value: totalCount + ' 盘', icon: 'box', bg: 'var(--success-color)', consumed: consumedCount > 0 ? '消耗 ' + consumedCount + ' 盘' : null },
                { label: '耗材总量', value: totalWeight.toFixed(1) + ' kg', icon: 'weight', bg: '#805ad5', consumed: consumedWeight > 0 ? '消耗 ' + consumedWeight.toFixed(1) + ' kg' : null },
                { label: '品牌数量', value: brandCount, icon: 'tag', bg: 'var(--warning-color)', consumed: null }
            ];

            html += '<div class="dashboard-stats-row">';
            stats.forEach((stat, i) => {
                const iconSvg = getStatIcon(stat.icon);
                const consumedHtml = stat.consumed ? `<div class="stat-card-consumed">${stat.consumed}</div>` : '';
                html += `
                <div class="stat-card" style="animation-delay:${i * 0.05}s">
                    <div class="stat-card-icon" style="background:${stat.bg};color:#fff">
                        ${iconSvg}
                    </div>
                    <div class="stat-card-info">
                        ${consumedHtml}
                        <div class="stat-card-label">${stat.label}</div>
                        <div class="stat-card-value">${stat.value}</div>
                    </div>
                </div>`;
            });
            html += '</div>';

            // 单列流式布局
            html += '<div class="dashboard-flow">';

            // 1+2. 品牌花费占比 + 渠道购买分布（一行两列，等高对齐）
            // 品牌花费占比：使用水平进度条（类似渠道分布）
            const brandCosts = {};
            filaments.forEach(f => {
                const b = f.brand || '未知';
                brandCosts[b] = (brandCosts[b] || 0) + (parseFloat(f.price) || 0);
            });
            const brandCostEntries = Object.entries(brandCosts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const brandCostTotal = brandCostEntries.reduce((s, e) => s + e[1], 0);
            const brandCostMax = Math.max(...brandCostEntries.map(e => e[1]), 1);
            const brandPalette = ['#2c7a7b', '#e53e3e', '#dd6b20', '#38a169', '#805ad5', '#d53f8c', '#3182ce', '#00b5d8', '#d69e2e', '#718096'];

            html += `
            <div class="dashboard-pair-row">
                <div class="dash-card">
                    <div class="dash-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                        品牌花费占比
                    </div>
                    <div class="channel-bar-list">
                        ${brandCostEntries.length === 0 ? '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">暂无品牌数据</div>' :
                        brandCostEntries.map(([name, cost], i) => {
                            const pct = ((cost / brandCostTotal) * 100).toFixed(1);
                            const color = brandPalette[i % brandPalette.length];
                            return `
                            <div class="channel-bar-item">
                                <div class="channel-bar-label">${this.escHtml(name)}</div>
                                <div class="channel-bar-track">
                                    <div class="channel-bar-fill" style="width:${(cost / brandCostMax * 100).toFixed(1)}%;background:#38a169">
                                        <span>${pct}%</span>
                                    </div>
                                </div>
                                <div class="channel-bar-value">¥${cost.toFixed(0)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
                <div class="dash-card">
                    <div class="dash-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                        渠道购买分布
                    </div>
                    <div id="channelDistContainer"></div>
                </div>
            </div>`;

            // 4. 排名类图表（三列）
            html += `
            <div class="dashboard-rank-row">
                <div class="dash-card">
                    <div class="dash-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
                        颜色分布
                    </div>
                    <div id="colorDistContainer"></div>
                </div>
                <div class="dash-card">
                    <div class="dash-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                        品牌数量排名
                    </div>
                    <div id="rankBrandContainer"></div>
                </div>
                <div class="dash-card">
                    <div class="dash-card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        耗材类型分布
                    </div>
                    <div id="rankTypeContainer"></div>
                </div>
            </div>`;

            // 5. 价格区间 + 极值统计（合并卡片）
            // 计算每盘的实际单价（套装按均价）
            const getAvgPrice = (f) => {
                const price = parseFloat(f.price) || 0;
                if (f.isBundle && f.bundleItems && f.bundleItems.length > 0) {
                    return price / f.bundleItems.length;
                }
                return price;
            };
            const priceRanges = [
                { label: '0 - 30 元', min: 0, max: 31 },
                { label: '31 - 50 元', min: 31, max: 51 },
                { label: '51 - 80 元', min: 51, max: 81 },
                { label: '81 - 100 元', min: 81, max: 101 }
            ];
            const priceRangeCounts = priceRanges.map(r => ({
                label: r.label,
                count: filaments.reduce((sum, f) => {
                    const qty = (f.isBundle && f.bundleItems) ? f.bundleItems.length : 1;
                    const p = getAvgPrice(f);
                    return sum + (p >= r.min && p < r.max ? qty : 0);
                }, 0)
            }));
            const sortedByPrice = [...filaments].sort((a, b) => getAvgPrice(b) - getAvgPrice(a));
            const sortedByRating = [...filaments].filter(f => f.rating && f.rating > 0).sort((a, b) => b.rating - a.rating);
            const mostExpensive = sortedByPrice[0];
            const cheapest = sortedByPrice[sortedByPrice.length - 1];
            const highestRated = sortedByRating[0];
            const lowestRated = sortedByRating[sortedByRating.length - 1];

            html += `
            <div class="dash-card">
                <div class="dash-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    价格区间分布
                </div>
                <div class="price-extreme-grid">
                    ${priceRangeCounts.map(r => `
                        <div class="price-mini-card">
                            <div class="price-mini-label">${r.label}</div>
                            <div class="price-mini-value">${r.count}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="dash-card-title" style="margin-top:20px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    极值统计
                </div>
                <div class="extreme-list">
                    <div class="extreme-item">
                        <div>
                            <div class="extreme-item-label">最贵耗材</div>
                            <div class="extreme-item-name">${mostExpensive ? this.escHtml(mostExpensive.name) : '--'}</div>
                        </div>
                        <div class="extreme-item-value">${mostExpensive ? '&yen;' + getAvgPrice(mostExpensive).toFixed(2) + (mostExpensive.isBundle ? ' <span style="font-size:11px;color:var(--text-secondary)">(均价)</span>' : '') : '--'}</div>
                    </div>
                    <div class="extreme-item">
                        <div>
                            <div class="extreme-item-label">最便宜耗材</div>
                            <div class="extreme-item-name">${cheapest ? this.escHtml(cheapest.name) : '--'}</div>
                        </div>
                        <div class="extreme-item-value">${cheapest ? '&yen;' + getAvgPrice(cheapest).toFixed(2) + (cheapest.isBundle ? ' <span style="font-size:11px;color:var(--text-secondary)">(均价)</span>' : '') : '--'}</div>
                    </div>
                    <div class="extreme-item">
                        <div>
                            <div class="extreme-item-label">最高评分</div>
                            <div class="extreme-item-name">${highestRated ? this.escHtml(highestRated.name) : '--'}</div>
                        </div>
                        <div class="extreme-item-value">${highestRated ? highestRated.rating + ' 分' : '--'}</div>
                    </div>
                    <div class="extreme-item">
                        <div>
                            <div class="extreme-item-label">最低评分</div>
                            <div class="extreme-item-name">${lowestRated ? this.escHtml(lowestRated.name) : '--'}</div>
                        </div>
                        <div class="extreme-item-value">${lowestRated ? lowestRated.rating + ' 分' : '--'}</div>
                    </div>
                </div>
            </div>`;

            // 7. 月度购买趋势（HTML 表格形式）
            const monthLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            const monthCounts = new Array(12).fill(0);
            filaments.forEach(f => {
                if (f.purchaseDate) {
                    const m = new Date(f.purchaseDate).getMonth();
                    if (m >= 0 && m < 12) {
                        const qty = (f.isBundle && f.bundleItems) ? f.bundleItems.length : 1;
                        monthCounts[m] += qty;
                    }
                }
            });
            const monthMax = Math.max(...monthCounts, 1);

            html += `
            <div class="dash-card">
                <div class="dash-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    月度购买趋势
                </div>
                <table class="monthly-trend-table">
                    <thead>
                        <tr>
                            ${monthLabels.map(m => `<th>${m}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            ${monthCounts.map(c => `<td class="${c > 0 ? 'has-data' : 'no-data'}">${c}</td>`).join('')}
                        </tr>
                    </tbody>
                </table>
            </div>`;

            html += '</div></div>'; // close dashboard-flow & dashboard-dark

            // 设置 innerHTML 后绑定 Canvas 绘制
            setTimeout(() => this._drawDashboardCharts(filaments), 0);

            return html;
        },

        _drawDashboardCharts(filaments) {
            const palette = [
                '#2c7a7b', '#e53e3e', '#dd6b20', '#38a169', '#805ad5',
                '#d53f8c', '#3182ce', '#00b5d8', '#d69e2e', '#718096'
            ];

            // ---- 2. 渠道购买分布（HTML/CSS 水平条形图） ----
            (function() {
                const container = document.getElementById('channelDistContainer');
                if (!container) return;
                const channelCounts = {};
                filaments.forEach(f => {
                    const ch = f.purchaseChannel || '未知';
                    const qty = (f.isBundle && f.bundleItems) ? f.bundleItems.length : 1;
                    channelCounts[ch] = (channelCounts[ch] || 0) + qty;
                });
                const entries = Object.entries(channelCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                if (entries.length === 0) {
                    container.innerHTML = '<div style="color:#999999;font-size:13px;text-align:center;padding:20px">暂无渠道数据</div>';
                    return;
                }
                const maxVal = Math.max(...entries.map(e => e[1]), 1);
                const totalCost = entries.reduce((s, e) => s + e[1], 0);

                let html = '<div class="channel-bar-list">';
                entries.forEach(([name, count], i) => {
                    const pct = ((count / totalCost) * 100).toFixed(1);
                    const color = palette[i % palette.length];
                    html += `
                        <div class="channel-bar-item">
                            <div class="channel-bar-label">${app.escHtml(name)}</div>
                            <div class="channel-bar-track">
                                <div class="channel-bar-fill" style="width:${(count / maxVal * 100).toFixed(1)}%;background:#eb370a">
                                    <span>${pct}%</span>
                                </div>
                            </div>
                            <div class="channel-bar-value">${count}</div>
                        </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            })();

            // ---- 3. 颜色分布（HTML 渲染） ----
            (function() {
                const container = document.getElementById('colorDistContainer');
                if (!container) return;
                const colorCounts = {};
                filaments.forEach(f => {
                    if (f.isBundle && f.bundleItems && f.bundleItems.length > 0) {
                        // 套装：统计每个子颜色
                        f.bundleItems.forEach(bi => {
                            const c = bi.colorName || bi.colorValue || '未知';
                            colorCounts[c] = (colorCounts[c] || 0) + 1;
                        });
                    } else {
                        const c = f.colorName || f.colorValue || '未知';
                        colorCounts[c] = (colorCounts[c] || 0) + 1;
                    }
                });
                const entries = Object.entries(colorCounts).sort((a, b) => b[1] - a[1]);
                const total = entries.reduce((s, e) => s + e[1], 0);
                if (total === 0) {
                    container.innerHTML = '<div style="color:#999999;font-size:13px;text-align:center;padding:20px">暂无颜色数据</div>';
                    return;
                }

                let html = '<div class="color-dist-bar">';
                entries.forEach(([name, count]) => {
                    const pct = ((count / total) * 100).toFixed(1);
                    let bgColor = '#64748b';
                    if (/^#[0-9A-Fa-f]{3,8}$/.test(name)) {
                        bgColor = name;
                    } else if (app.colorNameMap[name]) {
                        bgColor = app.colorNameMap[name];
                    }
                    const isTransparent = (name === '透明');
                    const isLight = app.isLightColor(bgColor);
                    const bgStyle = isTransparent
                        ? 'background:repeating-conic-gradient(#e2e8f0 0% 25%, #fff 0% 50%) 50%/10px 10px;'
                        : 'background:' + bgColor + ';';
                    const textColor = isLight ? 'color:#1a1a1a;' : 'color:#ffffff;';
                    html += `<div class="color-dist-bar-item" style="flex:${count};${bgStyle}${textColor}" title="${app.escHtml(name)}: ${count}个 (${pct}%)"></div>`;
                });
                html += '</div><div class="color-dist-legend">';
                entries.forEach(([name, count]) => {
                    const pct = ((count / total) * 100).toFixed(1);
                    let bgColor = '#64748b';
                    if (/^#[0-9A-Fa-f]{3,8}$/.test(name)) {
                        bgColor = name;
                    } else if (app.colorNameMap[name]) {
                        bgColor = app.colorNameMap[name];
                    }
                    const isTransparent = (name === '透明');
                    const swatchBg = isTransparent
                        ? 'background:repeating-conic-gradient(#e2e8f0 0% 25%, #fff 0% 50%) 50%/8px 8px;'
                        : 'background:' + bgColor + ';';
                    const swatchBorder = (isTransparent || app.isLightColor(bgColor)) ? 'border:1.5px solid #999;' : '';
                    html += `<div class="color-dist-legend-item"><div class="color-dist-legend-swatch" style="${swatchBg}${swatchBorder}"></div>${app.escHtml(name)} (${count}个)</div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            })();

            // ---- 4. 排名类图表（HTML 进度条） ----
            (function() {
                // 评分排名
                const ratingContainer = document.getElementById('rankRatingContainer');
                if (ratingContainer) {
                    const rated = filaments.filter(f => f.rating && f.rating > 0).sort((a, b) => b.rating - a.rating).slice(0, 10);
                    if (rated.length === 0) {
                        ratingContainer.innerHTML = '<div style="color:#999999;font-size:13px;text-align:center;padding:20px">暂无评分数据</div>';
                    } else {
                        let html = '<div class="ranking-list">';
                        rated.forEach(f => {
                            const pct = (f.rating / 5 * 100).toFixed(1);
                            html += `
                                <div class="ranking-item">
                                    <div class="ranking-item-label">${app.escHtml(f.name)}</div>
                                    <div class="ranking-item-bar">
                                        <div class="ranking-item-bar-fill" style="width:${pct}%"></div>
                                    </div>
                                    <div class="ranking-item-value">${f.rating}</div>
                                </div>`;
                        });
                        html += '</div>';
                        ratingContainer.innerHTML = html;
                    }
                }

                // 品牌数量排名
                const brandContainer = document.getElementById('rankBrandContainer');
                if (brandContainer) {
                    const brandCounts = {};
                    filaments.forEach(f => {
                        const b = f.brand || '未知';
                        const qty = (f.isBundle && f.bundleItems) ? f.bundleItems.length : 1;
                        brandCounts[b] = (brandCounts[b] || 0) + qty;
                    });
                    const entries = Object.entries(brandCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                    const maxVal = Math.max(...entries.map(e => e[1]), 1);
                    if (entries.length === 0) {
                        brandContainer.innerHTML = '<div style="color:#999999;font-size:13px;text-align:center;padding:20px">暂无品牌数据</div>';
                    } else {
                        let html = '<div class="ranking-list">';
                        entries.forEach(([name, count]) => {
                            const pct = (count / maxVal * 100).toFixed(1);
                            html += `
                                <div class="ranking-item">
                                    <div class="ranking-item-label">${app.escHtml(name)}</div>
                                    <div class="ranking-item-bar">
                                        <div class="ranking-item-bar-fill" style="width:${pct}%"></div>
                                    </div>
                                    <div class="ranking-item-value">${count}</div>
                                </div>`;
                        });
                        html += '</div>';
                        brandContainer.innerHTML = html;
                    }
                }

                // 类型分布
                const typeContainer = document.getElementById('rankTypeContainer');
                if (typeContainer) {
                    const typeCounts = {};
                    filaments.forEach(f => {
                        const t = f.type || '未知';
                        const qty = (f.isBundle && f.bundleItems) ? f.bundleItems.length : 1;
                        typeCounts[t] = (typeCounts[t] || 0) + qty;
                    });
                    const entries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                    const maxVal = Math.max(...entries.map(e => e[1]), 1);
                    if (entries.length === 0) {
                        typeContainer.innerHTML = '<div style="color:#999999;font-size:13px;text-align:center;padding:20px">暂无类型数据</div>';
                    } else {
                        let html = '<div class="ranking-list">';
                        entries.forEach(([name, count]) => {
                            const pct = (count / maxVal * 100).toFixed(1);
                            html += `
                                <div class="ranking-item">
                                    <div class="ranking-item-label">${app.escHtml(name)}</div>
                                    <div class="ranking-item-bar">
                                        <div class="ranking-item-bar-fill" style="width:${pct}%"></div>
                                    </div>
                                    <div class="ranking-item-value">${count}</div>
                                </div>`;
                        });
                        html += '</div>';
                        typeContainer.innerHTML = html;
                    }
                }
            })();

        },

        // 打开新增模态框（根据当前模块）
        openAddModal() {
            switch (this.currentModule) {
                case 'filaments':
                    this.openAddFilamentModal();
                    break;
                case 'presets':
                    this.openAddPresetModal();
                    break;
                case 'knowledge':
                    this.openAddKnowledgeModal();
                    break;
                case 'dashboard':
                    break;
            }
        }
    };

    // ============================================
    // 初始化
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        app.init();
    });
    </script>
    <!-- 隐藏的文件输入，用于导入数据 -->
    <input type="file" id="importInput" class="hidden-input" accept=".json" onchange="app.importData(this)">
</body>
</html>
