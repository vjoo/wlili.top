    const colorEl = document.getElementById('sColorPrice');
    bwEl.value = priceBackup.bw || '';
    colorEl.value = priceBackup.color || '';
    togglePriceEdit(false);
  };

  // Cost panel edit toggle
  let costBackup = {};
  window.toggleCostPanelEdit = function(editing) {
    const bwEl = document.getElementById('sBwCost');
    const colorEl = document.getElementById('sColorCost');
    const actionsEl = document.getElementById('costActions');
    const bwRestore = document.getElementById('sBwCostRestore');
    const colorRestore = document.getElementById('sColorCostRestore');
    if (editing === undefined) editing = bwEl.readOnly;
    if (editing) {
      costBackup = { bw: bwEl.value, color: colorEl.value };
      bwEl.readOnly = false; bwEl.style.background = '';
      colorEl.readOnly = false; colorEl.style.background = '';
      if (bwRestore) bwRestore.style.display = '';
      if (colorRestore) colorRestore.style.display = '';
      bwEl.focus();
      actionsEl.innerHTML = '<button class="btn-primary" onclick="saveCostOverride();toggleCostPanelEdit(false);">保存</button> <button class="btn-secondary" onclick="cancelCostPanelEdit()">取消</button>';
    } else {
      bwEl.readOnly = true; bwEl.style.background = 'var(--bg-hover)';
      colorEl.readOnly = true; colorEl.style.background = 'var(--bg-hover)';
      if (bwRestore) bwRestore.style.display = 'none';
      if (colorRestore) colorRestore.style.display = 'none';
      actionsEl.innerHTML = '<button class="btn-primary" onclick="toggleCostPanelEdit()">修改</button>';
    }
  };
  window.restoreBwCost = function() {
    document.getElementById('sBwCost').value = calcInkCostPerPage('black');
  };
  window.restoreColorCost = function() {
    document.getElementById('sColorCost').value = calcInkCostPerPage('color');
  };
  window.cancelCostPanelEdit = function() {
    const bwEl = document.getElementById('sBwCost');
    const colorEl = document.getElementById('sColorCost');
    bwEl.value = costBackup.bw || '';
    colorEl.value = costBackup.color || '';
    toggleCostPanelEdit(false);
  };

  // Op cost edit toggle
  let opCostBackup = {};
  window.toggleOpCostEdit = function(editing) {
    const fields = ['sElecPrice','sPrinterPrice','sPrinterLife','sPrinterWatt'];
    const actionsEl = document.getElementById('opCostActions');
    if (editing === undefined) editing = document.getElementById('sElecPrice').readOnly;
    if (editing) {
      opCostBackup = {};
      fields.forEach(id => { opCostBackup[id] = document.getElementById(id).value; });
      fields.forEach(id => { const el = document.getElementById(id); el.readOnly = false; el.style.background = ''; });
      actionsEl.innerHTML = '<button class="btn-primary" onclick="saveOpCost();toggleOpCostEdit(false);">保存</button> <button class="btn-secondary" onclick="cancelOpCostEdit()">取消</button>';
    } else {
      fields.forEach(id => { const el = document.getElementById(id); el.readOnly = true; el.style.background = 'var(--bg-hover)'; });
      actionsEl.innerHTML = '<button class="btn-primary" onclick="toggleOpCostEdit()">修改</button>';
    }
  };
  window.cancelOpCostEdit = function() {
    Object.keys(opCostBackup).forEach(id => { document.getElementById(id).value = opCostBackup[id]; });
    toggleOpCostEdit(false);
  };
  window.saveOpCost = function() {
    data.settings.elecPrice = parseFloat(document.getElementById('sElecPrice').value) || 0.538;
    data.settings.printerPrice = parseFloat(document.getElementById('sPrinterPrice').value) || 2000;
    data.settings.printerLife = parseInt(document.getElementById('sPrinterLife').value) || 3;
    data.settings.printerWatt = parseInt(document.getElementById('sPrinterWatt').value) || 20;
    save(); renderContent(); toast('运营成本已保存');
  };
  window.toggleOpCost = function() {
    const checkbox = document.getElementById('opCostToggle');
    if (checkbox.checked) {
      // Opening - confirm
      if (!confirm('开启后将把电费和打印机折旧计入每张打印成本，影响盈亏分析结果。确定开启？')) {
        checkbox.checked = false;
        return;
      }
      data.settings.opCostEnabled = true;
      save(); renderContent(); toast('运营成本已启用，已计入成本分析');
    } else {
      data.settings.opCostEnabled = false;
      save(); renderContent(); toast('运营成本已关闭');
    }
  };

  window.resetData = function() {
    if (!confirm('确定重置所有数据？此操作不可恢复！')) return;
    data = getDefaultData();
    save(); renderContent(); toast('数据已重置');
  };
  window.exportData = function() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'print-manager-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click(); URL.revokeObjectURL(a.href);
    toast('数据已导出');
  };
  window.importData = function() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = function() {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported || typeof imported !== 'object') throw new Error('格式错误');
          if (!confirm('导入将覆盖当前所有数据，确定继续？')) return;
          data = imported;
          save();
          renderContent();
          toast('数据导入成功');
        } catch (err) {
          toast('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  // ===== Init =====
  renderContent();
})();
</script>
</body>
</html>
