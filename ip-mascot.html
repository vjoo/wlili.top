<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Content Security Policy - WLi Tools -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP形象生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
/* ============================================
   WLi Tools - 在线工具集
   Copyright (c) 2025 WLi. All rights reserved.
   Developer: WLi
   ============================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #ffffff;
            --bg-elevated: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f1f5;
            --bg-hover: #e8e9f0;
            --border: #e0e2ec;
            --border-focus: #6366f1;
            --text-primary: #1a1c2e;
            --text-secondary: #6b6f85;
            --text-muted: #a0a3b5;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --accent-soft: rgba(99, 102, 241, 0.05);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.08);
            --warning: #fbbf24;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.08);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .app {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            animation: fadeUp 0.6s ease-out;
        }
        .header-left {}
        .logo {
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .header-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            max-width: 480px;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            animation: fadeUp 0.6s ease-out both;
        }
        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.15s; }
        .card:nth-child(5) { animation-delay: 0.2s; }

        .card-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        /* ── Style Selector ── */
        .style-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .style-tab {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .style-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .style-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .style-tab .tab-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
        }
        .style-tab .tab-desc {
            display: block;
            font-size: 11px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .custom-template-wrap {
            display: none;
            margin-top: 12px;
        }
        .custom-template-wrap.visible {
            display: block;
        }

        /* ── Form Grid ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-grid .full { grid-column: 1 / -1; }

        .field {}
        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .field-label .hint {
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .field-input,
        .field-select,
        .field-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-body);
            outline: none;
            transition: all 0.2s;
        }
        .field-input:focus,
        .field-select:focus,
        .field-textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .field-textarea {
            resize: vertical;
            min-height: 56px;
            line-height: 1.5;
        }
        .field-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b6f85' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 32px;
        }

        /* ── Color Picker ── */
        .color-mode-toggle {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .color-mode-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-mode-btn.active {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }
        .color-selects {
            display: flex;
            gap: 8px;
        }
        .color-selects .field-select { flex: 1; }
        .color-hex-wrap {
            display: none;
        }
        .color-hex-wrap.visible { display: block; }
        .color-hex-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-preview {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .color-hex-input .field-input { flex: 1; }

        /* ── Action Chips ── */
        .action-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
        }
        .action-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .action-chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .action-chip.selected {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }
        .action-chip.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .action-chip .check {
            width: 14px;
            height: 14px;
            border: 1.5px solid var(--border);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .action-chip.selected .check {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .action-limit {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-generate {
            flex: 1;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-generate:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 28px var(--accent-glow);
        }
        .btn-generate:active {
            transform: translateY(0);
        }
        .btn-reset {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
        }
        .btn-reset:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        /* ── Result ── */
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .result-box {
            position: relative;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            min-height: 120px;
            max-height: 520px;
            overflow-y: auto;
        }
        .result-content {
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.75;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            color: var(--text-muted);
            font-size: 14px;
            gap: 8px;
        }
        .result-placeholder .ph-icon {
            font-size: 28px;
            opacity: 0.5;
        }
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .copy-btn.copied {
            background: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
        }
        .copy-helper {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
        }

        /* ── Word Count ── */
        .word-count {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
            animation: fadeUp 0.6s ease-out 0.3s both;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Scrollbar ── */
        .result-box::-webkit-scrollbar { width: 5px; }
        .result-box::-webkit-scrollbar-track { background: transparent; }
        .result-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .result-box::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .app { padding: 24px 16px 40px; }
            .header { flex-direction: column; gap: 16px; }
            .header h1 { font-size: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 20px; }
            .style-tabs { flex-direction: column; }
            .btn-row { flex-direction: column; }
        }
    </style>
    <script src="nav.js"></script>
</head>
<body>

<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">Prompt Studio</div>
            <h1>IP Mascot Prompt Generator</h1>
            <p class="header-desc">填写角色信息，一键生成专业级 AI 绘画提示词。支持 3D潮玩 / 二次元 / 国潮 / 自定义风格。</p>
        </div>
    </header>

    <!-- Style Selector -->
    <div class="card">
        <div class="card-title">
            <span class="icon">🎨</span>
            风格模板
        </div>
        <div class="style-tabs" id="styleTabs">
            <button class="style-tab active" data-style="3d">
                <span class="tab-label">3D 盲盒潮玩</span>
                <span class="tab-desc">哑光磨砂 · 商业渲染</span>
            </button>
            <button class="style-tab" data-style="anime">
                <span class="tab-label">二次元插画</span>
                <span class="tab-desc">日系平涂 · 治愈清新</span>
            </button>
            <button class="style-tab" data-style="china">
                <span class="tab-label">国潮国风</span>
                <span class="tab-desc">水墨笔触 · 古风萌系</span>
            </button>
            <button class="style-tab" data-style="custom">
                <span class="tab-label">自定义</span>
                <span class="tab-desc">自由编写模板</span>
            </button>
        </div>
        <div class="custom-template-wrap" id="customWrap">
            <textarea class="field-textarea" id="customTemp" rows="5" placeholder="支持变量：{name} {animal} {mainColor} {mainHex} {brandColor} {brandHex} {intro} {nickname} {birthday} {bodyShape} {gender} {personality} {hobby} {action1-6}"></textarea>
        </div>
    </div>

    <!-- Basic Info -->
    <div class="card">
        <div class="card-title">
            <span class="icon">📋</span>
            基础信息
        </div>
        <div class="form-grid">
            <div class="field">
                <label class="field-label">角色英文名 <span class="hint">用于画面文字</span></label>
                <input class="field-input" type="text" id="name" value="PiPi">
            </div>
            <div class="field">
                <label class="field-label">动物 / 物体种类 <span class="hint">如 小熊猫、白猫</span></label>
                <input class="field-input" type="text" id="animal" value="小熊猫">
            </div>
            <div class="field full">
                <label class="field-label">角色简介 <span class="hint">2~3 句话，用于画面文字展示</span></label>
                <textarea class="field-textarea" id="intro">一只活泼可爱的小熊猫，喜欢冒险和交朋友</textarea>
            </div>
        </div>
    </div>

    <!-- Appearance -->
    <div class="card">
        <div class="card-title">
            <span class="icon">🎭</span>
            外观设定
        </div>
        <div class="form-grid">
            <div class="field">
                <label class="field-label">主体颜色 <span class="hint">低饱和高级灰</span></label>
                <div class="color-mode-toggle" data-target="main">
                    <button class="color-mode-btn active" data-mode="select">下拉选择</button>
                    <button class="color-mode-btn" data-mode="hex">自定义色值</button>
                </div>
                <div class="color-selects" id="mainColorSelects">
                    <select class="field-select" id="c1-main">
                        <option value="cool">冷色系</option>
                        <option value="warm">暖色系</option>
                        <option value="neutral">中性色</option>
                    </select>
                    <select class="field-select" id="c2-main"></select>
                </div>
                <div class="color-hex-wrap" id="mainColorHex">
                    <div class="color-hex-input">
                        <div class="color-preview" id="mainColorPreview" style="background:#98A8B3"></div>
                        <input class="field-input" type="text" id="customMainHex" value="#98A8B3" placeholder="#98A8B3">
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="field-label">品牌主色 <span class="hint">低饱和高级灰</span></label>
                <div class="color-mode-toggle" data-target="brand">
                    <button class="color-mode-btn active" data-mode="select">下拉选择</button>
                    <button class="color-mode-btn" data-mode="hex">自定义色值</button>
                </div>
                <div class="color-selects" id="brandColorSelects">
                    <select class="field-select" id="c1-brand">
                        <option value="cool">冷色系</option>
                        <option value="warm">暖色系</option>
                        <option value="neutral">中性色</option>
                    </select>
                    <select class="field-select" id="c2-brand"></select>
                </div>
                <div class="color-hex-wrap" id="brandColorHex">
                    <div class="color-hex-input">
                        <div class="color-preview" id="brandColorPreview" style="background:#98A8B3"></div>
                        <input class="field-input" type="text" id="customBrandHex" value="#98A8B3" placeholder="#98A8B3">
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="field-label">体态比例</label>
                <select class="field-select" id="bodyShape">
                    <option value="kid">Q版幼崽 · 3头身</option>
                    <option value="teen" selected>标准少年 · 5~6头身</option>
                    <option value="tall">修长高挑 · 7~8头身</option>
                </select>
            </div>
            <div class="field">
                <label class="field-label">性别</label>
                <select class="field-select" id="gender">
                    <option value="男" selected>男</option>
                    <option value="女">女</option>
                    <option value="无性别">无性别</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Character Profile -->
    <div class="card">
        <div class="card-title">
            <span class="icon">✨</span>
            角色档案
        </div>
        <div class="form-grid">
            <div class="field">
                <label class="field-label">昵称</label>
                <input class="field-input" type="text" id="nickname" value="PiPi">
            </div>
            <div class="field">
                <label class="field-label">出生日月</label>
                <input class="field-input" type="text" id="birthday" value="05.20">
            </div>
            <div class="field">
                <label class="field-label">性格关键词</label>
                <input class="field-input" type="text" id="personality" value="活泼好奇">
            </div>
            <div class="field">
                <label class="field-label">爱好</label>
                <input class="field-input" type="text" id="hobby" value="探险和收集树叶">
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="card">
        <div class="card-title">
            <span class="icon">🏃</span>
            动作姿态
        </div>
        <div class="action-chips" id="actionChips"></div>
        <div class="action-limit" id="actionLimit">已选 <strong>0</strong> / 6 个动作</div>
    </div>

    <!-- Generate -->
    <div class="card">
        <div class="btn-row">
            <button class="btn btn-generate" id="generateBtn">✨ 生成提示词</button>
            <button class="btn btn-reset" id="resetBtn">重置</button>
        </div>
    </div>

    <!-- Result -->
    <div class="card" id="resultCard">
        <div class="result-header">
            <div class="card-title" style="margin-bottom:0">
                <span class="icon">📋</span>
                生成结果
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <button class="copy-btn" id="copyBtn">复制</button>
            <div class="result-placeholder" id="resultPlaceholder">
                <span class="ph-icon">✦</span>
                <span>填写信息后点击「生成提示词」</span>

function initActions() {
    const wrap = document.getElementById('actionChips');
    wrap.innerHTML = '';
    actionList.forEach((it, i) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'action-chip' + (it.def ? ' selected' : '');
        chip.dataset.val = it.val;
        chip.dataset.index = i;
        chip.innerHTML = `<span class="check">${it.def ? '✓' : ''}</span>${it.label}`;
        chip.title = it.desc;
        wrap.appendChild(chip);
    });
    syncActions();
}

function syncActions() {
    const chips = document.querySelectorAll('.action-chip');
    const selected = document.querySelectorAll('.action-chip.selected');
    chips.forEach(c => {
        const idx = parseInt(c.dataset.index);
        const isSelected = c.classList.contains('selected');
        c.querySelector('.check').textContent = isSelected ? '✓' : '';
        c.classList.toggle('disabled', selected.length >= 6 && !isSelected);
    });
    document.getElementById('actionLimit').innerHTML = `已选 <strong>${selected.length}</strong> / 6 个动作`;
}

document.getElementById('actionChips').addEventListener('click', e => {
    const chip = e.target.closest('.action-chip');
    if (!chip || chip.classList.contains('disabled')) return;
    chip.classList.toggle('selected');
    syncActions();
});

function getActions() {
    const arr = [];
    document.querySelectorAll('.action-chip.selected').forEach(c => arr.push(c.dataset.val));
    while (arr.length < 6) arr.push('stand');
    return arr.slice(0, 6);
}

// ── Get Final Color ──
function getFinalColor(type) {
    if (type === 'main') {
        if (document.getElementById('mainColorHex').classList.contains('visible')) {
            const hex = document.getElementById('customMainHex').value.trim();
            return { name: '自定义色', hex: hex || '#98A8B3' };
        }
        const name = document.getElementById('c2-main').value;
        const group = colorData[document.getElementById('c1-main').value] || [];
        return group.find(x => x.name === name) || { name: '雾霾蓝', hex: '#98A8B3' };
    } else {
        if (document.getElementById('brandColorHex').classList.contains('visible')) {
            const hex = document.getElementById('customBrandHex').value.trim();
            return { name: '自定义色', hex: hex || '#98A8B3' };
        }
        const name = document.getElementById('c2-brand').value;
        const group = colorData[document.getElementById('c1-brand').value] || [];
        return group.find(x => x.name === name) || { name: '雾霾蓝', hex: '#98A8B3' };
    }
}

// ── Copy ──
document.getElementById('copyBtn').addEventListener('click', () => {
    const content = document.getElementById('resultContent');
    const copyBtn = document.getElementById('copyBtn');
    const copyHelper = document.getElementById('copyHelper');
    const txt = content.textContent.trim();
    if (!txt) { alert('请先生成提示词'); return; }
    copyHelper.value = txt;
    copyHelper.select();
    document.execCommand('copy');
    copyBtn.textContent = '✓ 已复制';
    copyBtn.classList.add('copied');
    setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('copied');
    }, 2000);
});

// ── Reset ──
document.getElementById('resetBtn').addEventListener('click', () => location.reload());

// ── Generate Button ──
document.getElementById('generateBtn').addEventListener('click', generate);

// ── Init ──
window.onload = () => {
    initActions();
    initColorSelects('c1-main', 'c2-main');
    initColorSelects('c1-brand', 'c2-brand');
    // Default to cool
    document.getElementById('c1-main').value = 'cool';
    document.getElementById('c1-main').dispatchEvent(new Event('change'));
    document.getElementById('c1-brand').value = 'cool';
    document.getElementById('c1-brand').dispatchEvent(new Event('change'));
};
